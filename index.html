<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Baños - IES Odiel</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Carga del Motor PDF.js para leer los PDFs directamente en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  </script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    select { -webkit-appearance: none; appearance: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-100">
  <div id="root"></div>

  <!-- CONFIGURACIÓN FIREBASE Y LÓGICA DE DATOS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    window.FirebaseAPI = {
      auth, db, appId,
      signInWithCustomToken, signInAnonymously, onAuthStateChanged,
      doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc, query, where, orderBy, limit
    };

    window.dispatchEvent(new CustomEvent('firebaseReady'));
  </script>

  <!-- APLICACIÓN REACT -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    function initReactApp() {
      const { auth, db, appId, signInWithCustomToken, signInAnonymously, onAuthStateChanged, doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc } = window.FirebaseAPI;

      function App() {
        const [user, setUser] = useState(null);
        const [teacherProfile, setTeacherProfile] = useState(null);
        const [students, setStudents] = useState([]);
        const [teachersDB, setTeachersDB] = useState({});
        const [records, setRecords] = useState([]);
        const [activeTab, setActiveTab] = useState('list');
        const [searchTerm, setSearchTerm] = useState('');
        const [selectedUnit, setSelectedUnit] = useState('');
        const [isLoading, setIsLoading] = useState(true);
        const [isProcessing, setIsProcessing] = useState(false);
        const [statusMsg, setToast] = useState(null);
        
        const [loginUser, setLoginUser] = useState('');
        const [loginPass, setLoginPass] = useState('');
        
        const [isAdminMode, setIsAdminMode] = useState(false);
        const [adminPass, setAdminPass] = useState('');
        const [isAdminAuth, setIsAdminAuth] = useState(false);

        // Gestión de Autenticación
        useEffect(() => {
          const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          };
          initAuth();
          const unsubscribe = onAuthStateChanged(auth, (u) => {
            setUser(u);
            setIsLoading(false);
          });
          return () => unsubscribe();
        }, []);

        // Suscripción a datos públicos
        useEffect(() => {
          if (!user) return;
          
          const unsubStudents = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => {
            if (s.exists()) setStudents(s.data().list || []);
          });

          const unsubTeachers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => {
            if (s.exists()) setTeachersDB(s.data().list || {});
          });

          const today = new Date().toISOString().split('T')[0];
          const unsubRecords = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${today}`), (snap) => {
            const data = [];
            snap.forEach(d => data.push({id: d.id, ...d.data()}));
            setRecords(data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
          }, (err) => console.error("Error records:", err));

          return () => { unsubStudents(); unsubTeachers(); unsubRecords(); };
        }, [user]);

        // Cargar perfil de profesor guardado localmente
        useEffect(() => {
          if (!user) return;
          const loadProfile = async () => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'));
            if (snap.exists()) setTeacherProfile(snap.data());
          };
          loadProfile();
        }, [user]);

        const units = useMemo(() => {
          const u = [...new Set(students.map(s => s.unit))];
          return u.filter(Boolean).sort();
        }, [students]);

        const filteredStudents = useMemo(() => {
          if (!searchTerm && !selectedUnit) return students.slice(0, 50);
          return students.filter(s => {
            const matchSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase());
            const matchUnit = selectedUnit ? s.unit === selectedUnit : true;
            return matchSearch && matchUnit;
          }).slice(0, 100);
        }, [students, searchTerm, selectedUnit]);

        const showToast = (text, type = "success") => {
          setToast({ text, type });
          setTimeout(() => setToast(null), 3000);
        };

        const handleLogin = (e) => {
          e.preventDefault();
          const uId = loginUser.trim().toLowerCase();
          const pDni = loginPass.trim().toUpperCase();
          
          const teacher = teachersDB[uId];
          if (teacher && teacher.dni.toUpperCase() === pDni) {
            const profile = { ideaUser: uId, name: teacher.nombre };
            setTeacherProfile(profile);
            setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), profile);
          } else {
            showToast("Credenciales incorrectas", "error");
          }
        };

        const registerExit = async (studentId, reason = "baño") => {
          if (!teacherProfile) return;
          const now = new Date();
          const today = now.toISOString().split('T')[0];
          
          try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${today}`), {
              studentId,
              teacherName: teacherProfile.name,
              reason,
              timestamp: now.toISOString()
            });
            showToast("Salida registrada");
          } catch (e) {
            console.error(e);
          }
        };

        const deleteRecord = async (recordId) => {
          const today = new Date().toISOString().split('T')[0];
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${today}`, recordId));
            showToast("Registro eliminado");
          } catch (e) {
            showToast("Error al eliminar", "error");
          }
        };

        const processPDF = async (file, type) => {
          setIsProcessing(true);
          try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              fullText += textContent.items.map(item => item.str).join(' ') + "\n";
            }

            const lines = fullText.split('\n').filter(l => l.trim().length > 5);
            
            if (type === 'students') {
              const unitRegex = /\b([1-4]\s?º?\s?ESO|[1-2]\s?º?\s?BACH|FPB|PRAGE|CFGM|CFGS)\b/i;
              const extracted = [];
              lines.forEach((line, idx) => {
                if (line.includes(',') && !line.toLowerCase().includes('profesor')) {
                  const match = line.match(unitRegex);
                  if (match) {
                    const name = line.split(match[0])[0].trim().replace(/^[, ]+|[, ]+$/g, '');
                    extracted.push({ id: `s-${idx}-${Date.now()}`, name, unit: match[0].toUpperCase() });
                  }
                }
              });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), { list: extracted });
              showToast(`Cargados ${extracted.length} alumnos`);
            } else if (type === 'teachers') {
              const teachers = {};
              const dniRegex = /\d{8}[A-Z]/i;
              lines.forEach(line => {
                const dniMatch = line.match(dniRegex);
                if (dniMatch) {
                  const parts = line.split(/\s{2,}/);
                  const name = parts[0].trim();
                  const userMatch = line.match(/\b[a-z]{1,2}[a-z0-9]{5,8}\b/i);
                  const idea = userMatch ? userMatch[0].toLowerCase() : dniMatch[0].toLowerCase();
                  teachers[idea] = { nombre: name, dni: dniMatch[0].toUpperCase() };
                }
              });
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), { list: teachers });
              showToast(`Cargados ${Object.keys(teachers).length} profesores`);
            }
          } catch (e) {
            showToast("Error procesando PDF", "error");
          }
          setIsProcessing(false);
        };

        const formatDisplayName = (name) => {
          if (!name) return "";
          return name.split(',')[0].split(' ').slice(0,2).join(' ');
        };

        if (isLoading) return (
          <div className="h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-400 font-bold">
            Cargando...
          </div>
        );

        if (!teacherProfile && !isAdminMode) {
          return (
            <div className="h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
              <form onSubmit={handleLogin} className="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                <h1 className="text-3xl font-black text-center mb-1 text-slate-800 uppercase tracking-tighter">IES ODIEL</h1>
                <p className="text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-10">Control de Pasillo</p>
                
                <div className="space-y-4 mb-10">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block">Usuario IdEA</label>
                    <input type="text" value={loginUser} onChange={e => setLoginUser(e.target.value)} placeholder="ej: jgarper123" className="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold text-sm border border-slate-100 focus:border-blue-600" />
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 uppercase ml-4 mb-1 block">DNI con letra</label>
                    <input type="password" value={loginPass} onChange={e => setLoginPass(e.target.value)} placeholder="********" className="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold text-sm border border-slate-100 focus:border-blue-600" />
                  </div>
                </div>

                <button type="submit" className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-black active:scale-95 transition-all text-sm uppercase tracking-widest">Acceder al Control</button>
                
                <button type="button" onClick={() => setIsAdminMode(true)} className="w-full mt-8 text-blue-600 font-black text-[10px] uppercase tracking-[0.2em] text-center py-2">
                  Administrador
                </button>
              </form>
            </div>
          );
        }

        if (isAdminMode) {
          return (
            <div className="h-screen bg-slate-900 text-white p-8 flex flex-col items-center justify-center">
              <div className="w-full max-w-md">
                <div className="flex justify-between items-center mb-10">
                  <h2 className="text-2xl font-black uppercase tracking-tight">Gestión del Centro</h2>
                  <button onClick={() => {setIsAdminMode(false); setIsAdminAuth(false);}} className="p-3 bg-slate-800 rounded-2xl text-slate-400">Cerrar</button>
                </div>

                {!isAdminAuth ? (
                  <div className="space-y-6 text-center">
                    <div className="bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
                      <p className="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest">Acceso Restringido</p>
                      <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} placeholder="Contraseña Admin" className="w-full bg-slate-900 p-5 rounded-2xl border border-slate-700 font-bold mb-4 outline-none focus:border-blue-500 transition-all text-center" />
                      <button onClick={() => adminPass === 'odilea21' ? setIsAdminAuth(true) : showToast("Incorrecta", "error")} className="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition-colors">Entrar al Panel</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6">
                    <div className="bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700">
                      <p className="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest">Importación de Datos (Séneca PDF)</p>
                      <div className="grid gap-4">
                        <label className="flex flex-col gap-2 bg-slate-700/30 p-6 rounded-3xl border border-slate-700 cursor-pointer hover:bg-slate-700/50">
                          <span className="text-xs font-black uppercase">📄 Listado de Alumnos</span>
                          <input type="file" accept=".pdf" className="hidden" onChange={e => processPDF(e.target.files[0], 'students')} />
                        </label>
                        <label className="flex flex-col gap-2 bg-slate-700/30 p-6 rounded-3xl border border-slate-700 cursor-pointer hover:bg-slate-700/50">
                          <span className="text-xs font-black uppercase">👨‍🏫 Listado Profesorado</span>
                          <input type="file" accept=".pdf" className="hidden" onChange={e => processPDF(e.target.files[0], 'teachers')} />
                        </label>
                      </div>
                    </div>
                    {isProcessing && <div className="text-center font-black animate-pulse text-blue-400">Procesando...</div>}
                  </div>
                )}
              </div>
            </div>
          );
        }

        return (
          <div className="h-screen flex flex-col max-w-md mx-auto bg-slate-50 relative shadow-2xl overflow-hidden">
            {statusMsg && (
              <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100]">
                <div className={`px-8 py-4 rounded-full shadow-2xl font-black text-xs uppercase tracking-widest ${statusMsg.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>
                  {statusMsg.text}
                </div>
              </div>
            )}

            <header className="bg-white px-8 pt-8 pb-6 border-b border-slate-100 flex justify-between items-end shadow-sm shrink-0">
              <div>
                <h2 className="text-2xl font-black text-slate-900 leading-none tracking-tighter">IES ODIEL</h2>
                <p className="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mt-2">{formatDisplayName(teacherProfile.name)}</p>
              </div>
              <button onClick={() => { setTeacherProfile(null); deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active')); }} className="p-4 bg-slate-50 rounded-2xl text-slate-400">Cerrar</button>
            </header>

            <nav className="flex px-6 py-4 gap-3 bg-white border-b border-slate-100 shrink-0">
              <button onClick={() => setActiveTab('list')} className={`flex-1 py-4 text-[10px] font-black rounded-2xl transition-all uppercase tracking-widest ${activeTab === 'list' ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-50 text-slate-400'}`}>Alumnado</button>
              <button onClick={() => setActiveTab('history')} className={`flex-1 py-4 text-[10px] font-black rounded-2xl transition-all uppercase tracking-widest ${activeTab === 'history' ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-50 text-slate-400'}`}>Historial</button>
            </nav>

            <main className="flex-1 overflow-y-auto px-6 py-6 pb-24 no-scrollbar">
              {activeTab === 'list' ? (
                <div className="space-y-6">
                  <div className="space-y-3">
                    <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Buscar por nombre..." className="w-full bg-white px-6 py-5 rounded-3xl outline-none font-bold text-sm border border-slate-100 shadow-sm focus:border-blue-600 transition-colors" />
                    <div className="flex overflow-x-auto gap-2 no-scrollbar pb-2">
                      <button onClick={() => setSelectedUnit('')} className={`px-5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest whitespace-nowrap ${!selectedUnit ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>TODOS</button>
                      {units.map(u => (
                        <button key={u} onClick={() => setSelectedUnit(u)} className={`px-5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest whitespace-nowrap ${selectedUnit === u ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-100'}`}>{u}</button>
                      ))}
                    </div>
                  </div>

                  <div className="grid gap-3">
                    {filteredStudents.map(student => {
                      const todayCount = records.filter(r => r.studentId === student.id).length;
                      return (
                        <div key={student.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center justify-between shadow-sm">
                          <div className="flex-1 min-w-0 pr-4">
                            <h4 className="font-bold text-sm text-slate-800 uppercase truncate leading-tight">{student.name}</h4>
                            <div className="flex items-center gap-2 mt-1">
                              <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{student.unit}</span>
                              {todayCount > 0 && <span className="text-[9px] font-black bg-orange-100 text-orange-600 px-2 py-0.5 rounded-lg">Salió {todayCount} {todayCount === 1 ? 'vez' : 'veces'}</span>}
                            </div>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={() => registerExit(student.id, 'baño')} className="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center border border-blue-100 font-bold active:scale-90 transition-transform">🚻</button>
                            <button onClick={() => registerExit(student.id, 'otros')} className="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center border border-slate-200 font-bold active:scale-90 transition-transform">📌</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="space-y-4">
                  {records.map(record => {
                    const s = students.find(x => x.id === record.studentId);
                    const studentName = s ? s.name : "Alumno Externo";
                    const time = new Date(record.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const date = new Date(record.timestamp).toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                    const reasonIcon = record.reason === 'baño' ? '🚻' : '📌';
                    const reason = record.reason === 'baño' ? 'Baño' : 'Otros';
                    
                    // Condición para mostrar papelera: el profesor que registró debe ser el mismo que el logueado
                    const canDelete = record.teacherName === teacherProfile.name;
                    
                    return (
                      <div key={record.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex items-center shadow-sm relative overflow-hidden group">
                        <div className="absolute left-0 top-0 h-full w-1.5 bg-slate-900 group-hover:bg-blue-600 transition-colors"></div>
                        <div className="flex flex-col pr-4 shrink-0 border-r border-slate-50 text-center min-w-[60px]">
                          <span className="font-black text-slate-800 text-sm">{time}</span>
                          <span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{date}</span>
                        </div>
                        <div className="flex-1 min-w-0 pl-4 pr-2">
                          <p className="text-xs font-black text-slate-800 uppercase truncate mb-1">{studentName}</p>
                          <div className="flex items-center gap-2 flex-wrap">
                            <span className="text-[10px] font-medium text-slate-600">{reasonIcon} {reason}</span>
                            <span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">👤 {formatDisplayName(record.teacherName)}</span>
                          </div>
                        </div>
                        {canDelete && (
                          <button 
                            onClick={() => deleteRecord(record.id)}
                            className="p-3 text-red-300 hover:text-red-600 transition-colors shrink-0"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }

    if (window.FirebaseAPI) {
      initReactApp();
    } else {
      window.addEventListener('firebaseReady', initReactApp);
    }
  </script>
</body>
</html>
