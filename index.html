<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Pasillos - IES Odiel</title>

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        select { 
            -webkit-appearance: none; 
            appearance: none; 
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        input, select, textarea {
            font-size: 16px !important;
        }
        .student-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .student-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <!-- MÓDULO DE INICIALIZACIÓN DE FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs, query, where
        };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- LÓGICA DEL NÚCLEO DE LA APLICACIÓN (REACT) -->
    <script type="text/babel">
        function initReactApp() {
            const { useState, useMemo, useEffect, useRef } = React;
            const {
                initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
                getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs, query, where
            } = window.FirebaseAPI;

            // CONFIGURACIÓN FIREBASE (Source Context)
            const firebaseConfig = {
                apiKey: "AIzaSyCeQ6so402oADraHknUMMdB95zLtz8hNd8",
                authDomain: "control-de-pasillos.firebaseapp.com",
                projectId: "control-de-pasillos",
                storageBucket: "control-de-pasillos.firebasestorage.app",
                messagingSenderId: "869022506837",
                appId: "1:869022506837:web:d3d91eb5cfd8b66d2019dc",
                measurementId: "G-X15S8NJVQV"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "ies-odiel-app";

            // TRAMOS HORARIOS IES ODIEL
            const TIME_SLOTS = [
                { id: 1, start: '08:30', end: '09:30' },
                { id: 2, start: '09:30', end: '10:30' },
                { id: 3, start: '10:30', end: '11:30' },
                { id: 4, start: '12:00', end: '13:00' },
                { id: 5, start: '13:00', end: '14:00' },
                { id: 6, start: '14:00', end: '15:00' }
            ];

            // ICONOGRAFÍA (SVG)
            const ToiletIcon = ({size=24}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M7 21h10"/><path d="M9 5h6"/><path d="M12 5v16"/><circle cx="12" cy="3" r="1"/></svg>
            );
            const PhoneIcon = ({size=24}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            );
            const SicknessIcon = ({size=24}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            );
            const OthersIcon = ({size=24}) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            );
            const Search = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
            const Trash2 = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
            const Clock = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
            const LogOut = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
            const Settings = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.96 1.41.96h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
            const X = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

            // FUNCIONES DE APOYO (Faithful to Source Context)
            const removeAccents = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
            const formatDisplayName = (fullName) => {
                if (!fullName) return "";
                if (fullName.includes(',')) {
                    const parts = fullName.split(',');
                    return `${parts[1].trim()} ${parts[0].trim()}`;
                }
                return fullName;
            };

            const normalizeTeacherName = (name) => {
                if (!name) return "";
                let clean = name.split('-')[0].split('(')[0];
                return removeAccents(clean).replace(/[^a-zA-Z]/g, '').toUpperCase();
            };

            const standardizeUnitCode = (text) => {
                if (!text) return "";
                let s = removeAccents(text.toUpperCase()).replace(/[^A-Z0-9]/g, '');
                s = s.replace(/BACHILLERATO/g, 'BAC').replace(/BACH/g, 'BAC').replace(/BCHTO/g, 'BAC').replace(/BTO/g, 'BAC');
                s = s.replace(/EDUCACIONSECUNDARIAOBLIGATORIA/g, 'ESO');
                s = s.replace(/PRIMERO/g, '1').replace(/SEGUNDO/g, '2').replace(/TERCERO/g, '3').replace(/CUARTO/g, '4');
                return s;
            };

            function parseCSVText(text, delimiter = ',') {
                let result = [], row = [], inQuotes = false, value = '';
                text = text.replace(/^\uFEFF/, '');
                for (let i = 0; i < text.length; i++) {
                    let char = text[i], nextChar = text[i+1];
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') { value += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === delimiter && !inQuotes) {
                        row.push(value.trim()); value = '';
                    } else if ((char === '\n' || char === '\r') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') i++;
                        row.push(value.trim());
                        if (row.some(c => c !== '')) result.push(row);
                        row = []; value = '';
                    } else { value += char; }
                }
                if (value || row.length > 0) {
                    row.push(value.trim());
                    if (row.some(c => c !== '')) result.push(row);
                }
                return result;
            }

            const parsePDF = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let rows = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    let yRows = {};
                    content.items.forEach(item => {
                        const str = item.str.trim();
                        if (!str) return;
                        const y = Math.round(item.transform[5] / 5) * 5;
                        if (!yRows[y]) yRows[y] = [];
                        yRows[y].push(item);
                    });
                    const sortedY = Object.keys(yRows).sort((a, b) => b - a);
                    sortedY.forEach(y => {
                        const items = yRows[y].sort((a, b) => a.transform[4] - b.transform[4]);
                        let rowArr = [];
                        let currentCell = items[0].str.trim();
                        let lastX = items[0].transform[4], lastWidth = items[0].width;
                        for (let j = 1; j < items.length; j++) {
                            const item = items[j], x = item.transform[4];
                            if ((x - (lastX + lastWidth)) > 15) {
                                rowArr.push(currentCell);
                                currentCell = item.str.trim();
                            } else { currentCell += ' ' + item.str.trim(); }
                            lastX = x; lastWidth = item.width || 0;
                        }
                        rowArr.push(currentCell);
                        rows.push(rowArr);
                    });
                }
                return rows;
            };

            const getStyles = (count) => {
                if (count === 0) return { bg: 'bg-white', border: 'border-slate-200', badge: null };
                if (count === 1) return { bg: 'bg-yellow-50', border: 'border-yellow-300', badge: 'bg-yellow-200 text-yellow-800' };
                if (count === 2) return { bg: 'bg-orange-50', border: 'border-orange-300', badge: 'bg-orange-200 text-orange-800' };
                return { bg: 'bg-red-50', border: 'border-red-300', badge: 'bg-red-200 text-red-800' };
            };

            function App() {
                const [user, setUser] = useState(null);
                const [teacherProfile, setTeacherProfile] = useState(null);
                const [students, setStudents] = useState([]);
                const [teachersDB, setTeachersDB] = useState({});
                const [schedules, setSchedules] = useState({});
                const [records, setRecords] = useState([]);
                
                const [activeTab, setActiveTab] = useState('pasillos');
                const [selectedUnit, setSelectedUnit] = useState('');
                const [searchTerm, setSearchTerm] = useState('');
                const [toast, setToast] = useState('');
                const [isAdmin, setIsAdmin] = useState(false);
                const [isRetroMode, setIsRetroMode] = useState(false);
                const [retroDateTime, setRetroDateTime] = useState('');

                const [callModal, setCallModal] = useState({ show: false, student: null, target: 'Madre', notes: '' });
                const [ideaInput, setIdeaInput] = useState('');
                const [dniInput, setDniInput] = useState('');
                const [reportFilters, setReportFilters] = useState({ unit: '', start: '', end: '' });
                const [reportResults, setReportResults] = useState(null);

                // FIREBASE SYNC
                useEffect(() => {
                    signInAnonymously(auth).catch(console.error);
                    onAuthStateChanged(auth, u => setUser(u));
                }, []);

                useEffect(() => {
                    if (!user) return;
                    const todayStr = new Date().toISOString().split('T')[0];
                    const unsubStudents = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), s => s.exists() && setStudents(s.data().list || []));
                    const unsubTeachers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), s => s.exists() && setTeachersDB(s.data().list || {}));
                    const unsubSched = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), s => s.exists() && setSchedules(s.data().list || {}));
                    const unsubRecords = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${todayStr}`), snap => {
                        const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        setRecords(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    });
                    return () => { unsubStudents(); unsubTeachers(); unsubSched(); unsubRecords(); };
                }, [user]);

                useEffect(() => {
                    if (user) {
                        getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active')).then(s => {
                            if (s.exists() && s.data().name) setTeacherProfile(s.data());
                        });
                    }
                }, [user]);

                // SMART SCHEDULE LOGIC
                useEffect(() => {
                    if (!teacherProfile || Object.keys(schedules).length === 0 || students.length === 0) return;
                    const check = () => {
                        const now = (isRetroMode && retroDateTime) ? new Date(retroDateTime) : new Date();
                        const day = now.getDay();
                        if (day < 1 || day > 5) return;
                        const time = now.getHours() * 60 + now.getMinutes();
                        const slot = TIME_SLOTS.find(s => {
                            const [sh, sm] = s.start.split(':').map(Number);
                            const [eh, em] = s.end.split(':').map(Number);
                            return time >= (sh * 60 + sm) && time < (eh * 60 + em);
                        });
                        if (slot) {
                            const normName = normalizeTeacherName(teacherProfile.name);
                            const teacherSched = schedules[normName];
                            if (teacherSched) {
                                const cell = teacherSched[`${day}-${slot.id}`];
                                if (cell && !cell.toUpperCase().includes("GUARDIA")) {
                                    const normCell = standardizeUnitCode(cell);
                                    const matched = Array.from(new Set(students.map(s => s.unit))).find(u => normCell.includes(standardizeUnitCode(u)));
                                    if (matched) setSelectedUnit(matched);
                                }
                            }
                        }
                    };
                    check();
                }, [teacherProfile, schedules, students, isRetroMode, retroDateTime]);

                // CORE ACTION: REGISTER BREAK
                const registerBreak = async (studentId, reason, callTarget = '', notes = '') => {
                    const timestampToUse = (isRetroMode && retroDateTime) ? new Date(retroDateTime).toISOString() : new Date().toISOString();
                    const datePartition = timestampToUse.split('T')[0];
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${datePartition}`), {
                            studentId,
                            reason,
                            callTarget,
                            notes,
                            teacherName: teacherProfile.name,
                            teacherIdea: teacherProfile.idea,
                            timestamp: timestampToUse,
                            isRetroactive: isRetroMode
                        });
                        setToast(`✅ ${reason} registrado`);
                        setTimeout(() => setToast(''), 3000);
                        setCallModal({ show: false, student: null, target: 'Madre', notes: '' });
                        if (isRetroMode) { setIsRetroMode(false); setRetroDateTime(''); }
                    } catch (e) { alert("Error al guardar registro."); }
                };

                const handleLogin = (e) => {
                    e.preventDefault();
                    const idea = ideaInput.trim().toLowerCase();
                    const tData = teachersDB[idea];
                    if (tData && tData.dni === dniInput.trim().toUpperCase()) {
                        const profile = { name: tData.name, idea };
                        setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), profile);
                        setTeacherProfile(profile);
                    } else { alert("Credenciales incorrectas."); }
                };

                // ADMIN UPLOAD FUNCTIONS
                const handleUpload = async (type, file) => {
                    if (!file) return;
                    let resultData;
                    try {
                        if (type === 'students') {
                            const rows = file.name.endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text());
                            resultData = { list: rows.slice(1).map((r, i) => ({ id: `s_${i}_${Date.now()}`, name: r[0], unit: r[1] })).filter(x => x.name && x.unit) };
                        } else if (type === 'teachers') {
                            const rows = await parsePDF(file);
                            const map = {};
                            rows.slice(1).forEach(r => { if(r[1]) map[r[1].toLowerCase()] = { name: r[0], dni: r[2] }; });
                            resultData = { list: map };
                        } else if (type === 'schedules') {
                            const text = await file.text();
                            const map = {}; // Simplified GHC parser simulation
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), { list: {} }); 
                            alert("Sube un archivo HTML de GHC para procesar horarios."); return;
                        }
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', type), resultData);
                        alert(`✅ ${type} actualizado.`);
                    } catch (e) { alert("Error procesando archivo."); }
                };

                if (!teacherProfile) {
                    return (
                        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                            <form onSubmit={handleLogin} className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border border-slate-100">
                                <div className="text-center mb-10">
                                    <div className="bg-blue-600 w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white shadow-xl rotate-3">
                                        <Clock size={40} />
                                    </div>
                                    <h1 className="text-3xl font-black text-slate-800 tracking-tight">IES Odiel</h1>
                                    <p className="text-slate-400 text-sm font-bold uppercase tracking-widest mt-2">Control de Pasillos</p>
                                </div>
                                <div className="space-y-4">
                                    <input type="text" placeholder="Usuario IdEA" value={ideaInput} onChange={e => setIdeaInput(e.target.value)} className="w-full p-5 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-blue-500 transition-all font-medium" required />
                                    <input type="password" placeholder="DNI (con letra)" value={dniInput} onChange={e => setDniInput(e.target.value)} className="w-full p-5 bg-slate-50 border-2 border-transparent rounded-2xl outline-none focus:border-blue-500 transition-all font-medium uppercase" required />
                                    <button type="submit" className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">ACCEDER</button>
                                </div>
                                <button type="button" onClick={() => { if(prompt("Password Admin:")==="odilea21") setIsAdmin(true); }} className="w-full mt-8 text-[10px] font-black text-slate-300 hover:text-slate-500 uppercase tracking-widest">Panel de Administración</button>
                            </form>
                        </div>
                    );
                }

                if (isAdmin) {
                    return (
                        <div className="p-6 max-w-md mx-auto space-y-6">
                            <div className="flex items-center justify-between">
                                <h2 className="text-2xl font-black">Administración</h2>
                                <button onClick={() => setIsAdmin(false)} className="p-3 bg-slate-200 rounded-2xl"><X /></button>
                            </div>
                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border space-y-6">
                                <div className="space-y-4">
                                    <label className="block text-xs font-black uppercase text-slate-400">Carga de Datos</label>
                                    <button onClick={() => document.getElementById('upS').click()} className="w-full py-4 bg-slate-50 rounded-2xl text-sm font-bold border-2 border-dashed border-slate-200 hover:border-blue-400 transition-colors">Subir Alumnado (PDF/CSV)</button>
                                    <button onClick={() => document.getElementById('upT').click()} className="w-full py-4 bg-slate-50 rounded-2xl text-sm font-bold border-2 border-dashed border-slate-200 hover:border-emerald-400 transition-colors">Subir Profesorado (PDF)</button>
                                    <button onClick={() => alert("Sube el HTML de GHC directamente")} className="w-full py-4 bg-slate-50 rounded-2xl text-sm font-bold border-2 border-dashed border-slate-200 hover:border-purple-400 transition-colors">Subir Horarios GHC</button>
                                    <input type="file" id="upS" className="hidden" onChange={e => handleUpload('students', e.target.files[0])} />
                                    <input type="file" id="upT" className="hidden" onChange={e => handleUpload('teachers', e.target.files[0])} />
                                </div>
                                <div className="pt-6 border-t">
                                    <button onClick={async () => { if(confirm("¿BORRAR TODO?")) { /* Add mass delete logic */ } }} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl text-sm font-black border border-red-100 hover:bg-red-100 transition-colors">BORRADO DE PRUEBAS</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                const uniqueUnits = Array.from(new Set(students.map(s => s.unit))).filter(Boolean).sort();
                const filteredStudents = students.filter(s => {
                    const matchesUnit = selectedUnit ? s.unit === selectedUnit : true;
                    const matchesSearch = removeAccents(s.name.toLowerCase()).includes(removeAccents(searchTerm.toLowerCase()));
                    return matchesUnit && matchesSearch;
                });

                return (
                    <div className="min-h-screen flex flex-col bg-slate-100">
                        {/* HEADER */}
                        <header className="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 shadow-sm">
                            <div className="flex justify-between items-center max-w-md mx-auto">
                                <div>
                                    <h1 className="font-black text-xl text-blue-900 tracking-tighter">IES Odiel</h1>
                                    <p className="text-[9px] text-slate-400 font-black uppercase tracking-widest leading-none">{formatDisplayName(teacherProfile.name)}</p>
                                </div>
                                <button onClick={() => { setTeacherProfile(null); setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), {}); }} className="text-slate-300 p-2 hover:text-red-500 transition-colors">
                                    <LogOut size={22} />
                                </button>
                            </div>
                        </header>

                        {/* NAV */}
                        <nav className="flex bg-white border-b border-slate-200 max-w-md mx-auto w-full sticky top-[69px] z-30">
                            {['pasillos', 'historial', 'informes'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === tab ? 'text-blue-600 border-b-[3px] border-blue-600 bg-blue-50/30' : 'text-slate-400'}`}>
                                    {tab}
                                </button>
                            ))}
                        </nav>

                        <main className="flex-1 p-4 max-w-md mx-auto w-full pb-28">
                            
                            {activeTab === 'pasillos' && (
                                <div className="space-y-4">
                                    {/* FILTERS */}
                                    <div className="space-y-2 sticky top-[130px] z-20 bg-slate-100 pb-2">
                                        <select value={selectedUnit} onChange={e => setSelectedUnit(e.target.value)} className="w-full p-4 bg-white border border-slate-200 rounded-2xl shadow-sm text-sm font-black text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                            <option value="">TODOS LOS GRUPOS</option>
                                            {uniqueUnits.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                        <div className="relative">
                                            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                                            <input type="text" placeholder="Buscar alumno..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm text-sm font-medium outline-none" />
                                        </div>
                                        <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                            <button onClick={() => setIsRetroMode(!isRetroMode)} className={`w-full p-3 text-[10px] font-black uppercase flex items-center justify-between transition-colors ${isRetroMode ? 'bg-purple-600 text-white' : 'text-slate-400'}`}>
                                                <span>📅 Registro Manual / Pasado</span>
                                                <span>{isRetroMode ? 'ACTIVADO' : 'ABRIR'}</span>
                                            </button>
                                            {isRetroMode && (
                                                <div className="p-3 bg-purple-50 flex gap-2">
                                                    <input type="datetime-local" value={retroDateTime} onChange={e => setRetroDateTime(e.target.value)} className="flex-1 p-3 bg-white border border-purple-200 rounded-xl text-xs font-bold outline-none" />
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* LIST */}
                                    <div className="space-y-3">
                                        {filteredStudents.map(student => {
                                            const sRecords = records.filter(r => r.studentId === student.id);
                                            const counts = {
                                                bano: sRecords.filter(r => r.reason === 'Baño').length,
                                                llamada: sRecords.filter(r => r.reason === 'Llamada').length,
                                                enf: sRecords.filter(r => r.reason === 'Enfermedad').length,
                                                otros: sRecords.filter(r => r.reason === 'Otros').length
                                            };
                                            const total = sRecords.length;
                                            const styles = getStyles(total);

                                            return (
                                                <div key={student.id} className={`${styles.bg} p-4 rounded-3xl border ${styles.border} shadow-sm flex items-center justify-between student-card`}>
                                                    <div className="flex-1 min-w-0 pr-2">
                                                        <h3 className="font-bold text-sm text-slate-800 truncate">{student.name}</h3>
                                                        <p className="text-[10px] text-slate-400 font-black uppercase tracking-wider">{student.unit}</p>
                                                    </div>
                                                    <div className="flex gap-1.5">
                                                        {[
                                                            { reason: 'Baño', icon: <ToiletIcon />, color: 'blue', title: 'Ir al Baño', count: counts.bano },
                                                            { reason: 'Llamada', icon: <PhoneIcon />, color: 'emerald', title: 'Registrar Llamada', count: counts.llamada, isCall: true },
                                                            { reason: 'Enfermedad', icon: <SicknessIcon />, color: 'red', title: 'Enfermería/Malestar', count: counts.enf },
                                                            { reason: 'Otros', icon: <OthersIcon />, color: 'amber', title: 'Otros motivos', count: counts.otros }
                                                        ].map(btn => (
                                                            <button 
                                                                key={btn.reason} 
                                                                title={btn.title}
                                                                aria-label={btn.title}
                                                                onClick={() => btn.isCall ? setCallModal({ show: true, student, target: 'Madre', notes: '' }) : registerBreak(student.id, btn.reason)}
                                                                className={`relative p-2.5 bg-${btn.color}-50 text-${btn.color}-600 rounded-xl hover:bg-${btn.color}-100 transition-all active:scale-90 border border-${btn.color}-100`}
                                                            >
                                                                {btn.icon}
                                                                {btn.count > 0 && <span className={`absolute -top-1.5 -right-1.5 bg-${btn.color}-600 text-white text-[9px] font-black w-4 h-4 flex items-center justify-center rounded-lg shadow-sm`}>{btn.count}</span>}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'historial' && (
                                <div className="space-y-3">
                                    {records.length === 0 ? (
                                        <div className="text-center py-24 text-slate-300 font-black uppercase text-xs tracking-widest">Sin registros hoy</div>
                                    ) : (
                                        records.map(record => {
                                            const student = students.find(s => s.id === record.studentId);
                                            return (
                                                <div key={record.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between">
                                                    <div className="flex-1 min-w-0 pr-4">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">{new Date(record.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                                            <h4 className="font-bold text-xs text-slate-700 truncate">{student?.name || 'Cargando...'}</h4>
                                                        </div>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase">
                                                            Motivo: <span className="text-blue-600">{record.reason}</span> {record.callTarget && `(${record.callTarget})`} · Por: {formatDisplayName(record.teacherName)}
                                                        </p>
                                                        {record.notes && <p className="mt-1 text-[10px] text-slate-500 italic bg-slate-50 p-2 rounded-lg border border-slate-100">"{record.notes}"</p>}
                                                    </div>
                                                    {record.teacherIdea === teacherProfile.idea && (
                                                        <button onClick={async () => { if(confirm("¿Borrar registro?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${new Date().toISOString().split('T')[0]}`, record.id)); }} className="text-slate-300 hover:text-red-500 p-2"><Trash2 size={18} /></button>
                                                    )}
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            )}

                            {activeTab === 'informes' && (
                                <div className="space-y-4">
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                                        <h3 className="font-black text-slate-800 text-xs uppercase tracking-widest flex items-center gap-2"><Clock size={16} className="text-blue-600" /> Generar Informe</h3>
                                        <div className="space-y-3">
                                            <select value={reportFilters.unit} onChange={e => setReportFilters({...reportFilters, unit: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-black">
                                                <option value="">ELEGIR UNIDAD</option>
                                                {uniqueUnits.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                            <div className="flex gap-2">
                                                <input type="date" value={reportFilters.start} onChange={e => setReportFilters({...reportFilters, start: e.target.value})} className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold" />
                                                <input type="date" value={reportFilters.end} onChange={e => setReportFilters({...reportFilters, end: e.target.value})} className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold" />
                                            </div>
                                            <button onClick={async () => {
                                                if(!reportFilters.unit || !reportFilters.start) return alert("Selecciona unidad y fecha.");
                                                setReportResults([]);
                                                const dStart = new Date(reportFilters.start), dEnd = reportFilters.end ? new Date(reportFilters.end) : new Date();
                                                let results = [];
                                                for(let d = new Date(dStart); d <= dEnd; d.setDate(d.getDate() + 1)) {
                                                    const dStr = d.toISOString().split('T')[0];
                                                    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${dStr}`));
                                                    snap.forEach(docSnap => {
                                                        const data = docSnap.data();
                                                        const student = students.find(s => s.id === data.studentId);
                                                        if(student && student.unit === reportFilters.unit) results.push({ id: docSnap.id, date: dStr, ...data, studentName: student.name });
                                                    });
                                                }
                                                setReportResults(results.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                                            }} className="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-100 uppercase text-xs tracking-widest active:scale-95 transition-all">Consultar</button>
                                        </div>
                                    </div>
                                    {reportResults && (
                                        <div className="space-y-2">
                                            {reportResults.map(r => (
                                                <div key={r.id} className="bg-white p-4 rounded-2xl border text-[10px]">
                                                    <div className="flex justify-between font-black mb-1">
                                                        <span className="text-slate-800">{r.studentName}</span>
                                                        <span className="text-slate-400">{r.date}</span>
                                                    </div>
                                                    <p className="text-slate-600 font-bold uppercase">
                                                        <span className={r.reason === 'Llamada' ? 'text-emerald-600' : 'text-blue-600'}>{r.reason}</span> 
                                                        {r.callTarget && ` - DESTINATARIO: ${r.callTarget}`}
                                                    </p>
                                                    {r.notes && <p className="mt-1 text-slate-500 italic bg-slate-50 p-2 rounded-lg">Obs: {r.notes}</p>}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        {/* CALL MODAL */}
                        {callModal.show && (
                            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-end sm:items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300">
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">Registro de Llamada</h3>
                                    <p className="text-xs text-slate-400 mt-1 mb-6 font-bold uppercase tracking-wider">{callModal.student?.name}</p>
                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-[10px] font-black uppercase text-slate-300 mb-3 tracking-widest">Destinatario</p>
                                            <div className="flex gap-2">
                                                {['Madre', 'Padre', 'Familiar'].map(t => (
                                                    <button key={t} onClick={() => setCallModal({...callModal, target: t})} className={`flex-1 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border-2 transition-all ${callModal.target === t ? 'bg-emerald-600 text-white border-emerald-600 shadow-lg shadow-emerald-100' : 'bg-slate-50 text-slate-400 border-transparent'}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase text-slate-300 mb-3 tracking-widest">Observaciones</p>
                                            <textarea value={callModal.notes} onChange={e => setCallModal({...callModal, notes: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl text-sm outline-none focus:border-emerald-500 min-h-[100px] font-medium" placeholder="Notas de la llamada..." />
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => setCallModal({show: false, student: null, target: 'Madre', notes: ''})} className="flex-1 py-4 bg-slate-100 text-slate-500 font-black rounded-2xl uppercase text-[10px] tracking-widest">Cancelar</button>
                                            <button onClick={() => registerBreak(callModal.student.id, 'Llamada', callModal.target, callModal.notes)} className="flex-[2] py-4 bg-emerald-600 text-white font-black rounded-2xl shadow-lg shadow-emerald-200 uppercase text-[10px] tracking-widest active:scale-95 transition-all">Confirmar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TOAST */}
                        {toast && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-8 py-4 rounded-3xl text-xs font-black shadow-2xl flex items-center gap-3 border border-slate-700 animate-in fade-in zoom-in slide-in-from-bottom-4 uppercase tracking-[0.2em]">
                                <Clock size={16} className="text-blue-400" /> {toast}
                            </div>
                        )}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }

        if (window.FirebaseAPI) { initReactApp(); } 
        else { window.addEventListener('firebaseReady', initReactApp); }
    </script>
</body>
</html>
