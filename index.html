<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Control de Baños - IES Odiel</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui, sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .loader { border-top-color: #2563eb; animation: spinner 0.6s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased">
  <div id="root">
    <div class="h-screen flex flex-col items-center justify-center bg-slate-50">
      <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full mb-4"></div>
      <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Iniciando Sistema...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ========================================================
    // PEGA TUS CLAVES DE FIREBASE AQUÍ ABAJO (Paso 1 de la Guía)
    // ========================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCeQ6so402oADraHknUMMdB95zLtz8hNd8",
      authDomain: "control-de-pasillos.firebaseapp.com",
      projectId: "control-de-pasillos",
      storageBucket: "control-de-pasillos.firebasestorage.app",
      messagingSenderId: "869022506837",
      appId: "1:869022506837:web:d3d91eb5cfd8b66d2019dc",
      measurementId: "G-X15S8NJVQV"
    };
    // ========================================================

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const appId = firebaseConfig.projectId;

      window.FirebaseAPI = {
        auth, db, appId,
        signInAnonymously, onAuthStateChanged,
        doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc, query, orderBy
      };

      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
      }

      window.dispatchEvent(new CustomEvent('firebaseReady'));
    } catch (err) {
      console.error("Error de Firebase:", err);
      document.getElementById('root').innerHTML = `
        <div class="p-10 text-center">
          <p class="font-bold text-red-500 mb-4">Error de configuración</p>
          <p class="text-xs text-slate-500">Asegúrate de haber pegado tus claves correctamente en el archivo index.html</p>
        </div>`;
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function initReactApp() {
      const { auth, db, appId, signInAnonymously, onAuthStateChanged, doc, getDoc, setDoc, collection, onSnapshot, addDoc, deleteDoc } = window.FirebaseAPI;

      function App() {
        const [user, setUser] = useState(null);
        const [teacherProfile, setTeacherProfile] = useState(null);
        const [students, setStudents] = useState([]);
        const [teachersDB, setTeachersDB] = useState({});
        const [records, setRecords] = useState([]);
        const [activeTab, setActiveTab] = useState('list');
        const [searchTerm, setSearchTerm] = useState('');
        const [selectedUnit, setSelectedUnit] = useState('');
        const [isLoading, setIsLoading] = useState(true);
        const [isProcessing, setIsProcessing] = useState(false);
        const [toast, setToast] = useState(null);
        
        const [loginUser, setLoginUser] = useState('');
        const [loginPass, setLoginPass] = useState('');
        const [isAdminMode, setIsAdminMode] = useState(false);
        const [adminPass, setAdminPass] = useState('');
        const [isAdminAuth, setIsAdminAuth] = useState(false);

        useEffect(() => {
          signInAnonymously(auth).catch(console.error);
          return onAuthStateChanged(auth, (u) => {
            setUser(u);
            setIsLoading(false);
          });
        }, []);

        useEffect(() => {
          if (!user) return;
          
          const unsubStudents = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => {
            if (s.exists()) setStudents(s.data().list || []);
          });

          const unsubTeachers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => {
            if (s.exists()) setTeachersDB(s.data().list || {});
          });

          const today = new Date().toISOString().split('T')[0];
          const unsubRecords = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${today}`), (snap) => {
            const data = [];
            snap.forEach(d => data.push({id: d.id, ...d.data()}));
            setRecords(data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
          });

          const loadProfile = async () => {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'));
            if (snap.exists()) setTeacherProfile(snap.data());
          };
          loadProfile();

          return () => { unsubStudents(); unsubTeachers(); unsubRecords(); };
        }, [user]);

        const showToast = (text, type = "success") => {
          setToast({ text, type });
          setTimeout(() => setToast(null), 3000);
        };

        const handleLogin = (e) => {
          e.preventDefault();
          const uId = loginUser.trim().toLowerCase();
          const pDni = loginPass.trim().toUpperCase();
          const teacher = teachersDB[uId];
          
          if (teacher && teacher.dni.toUpperCase() === pDni) {
            const profile = { ideaUser: uId, name: teacher.nombre };
            setTeacherProfile(profile);
            setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), profile);
          } else {
            showToast("Datos incorrectos", "error");
          }
        };

        const registerExit = async (studentId, reason) => {
          const now = new Date();
          const today = now.toISOString().split('T')[0];
          try {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${today}`), {
              studentId,
              teacherName: teacherProfile.name,
              reason,
              timestamp: now.toISOString()
            });
            showToast("Salida anotada");
          } catch (e) {
            showToast("Error de red", "error");
          }
        };

        const deleteRecord = async (id) => {
          const today = new Date().toISOString().split('T')[0];
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${today}`, id));
          showToast("Borrado");
        };

        const units = useMemo(() => [...new Set(students.map(s => s.unit))].sort(), [students]);
        const filteredStudents = useMemo(() => {
          if (!searchTerm && !selectedUnit) return [];
          return students.filter(s => 
            s.name.toLowerCase().includes(searchTerm.toLowerCase()) && 
            (selectedUnit ? s.unit === selectedUnit : true)
          ).slice(0, 50);
        }, [students, searchTerm, selectedUnit]);

        if (isLoading) return null;

        if (!teacherProfile && !isAdminMode) {
          return (
            <div className="h-screen flex items-center justify-center p-6 bg-slate-100">
              <form onSubmit={handleLogin} className="w-full max-w-sm bg-white p-10 rounded-[2.5rem] shadow-xl">
                <h1 className="text-2xl font-black text-center mb-1 text-slate-800">IES ODIEL</h1>
                <p className="text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Acceso Profesores</p>
                <div className="space-y-3 mb-6">
                  <input type="text" value={loginUser} onChange={e => setLoginUser(e.target.value)} placeholder="Usuario IdEA" className="w-full bg-slate-50 p-4 rounded-2xl outline-none border border-slate-100" />
                  <input type="password" value={loginPass} onChange={e => setLoginPass(e.target.value)} placeholder="DNI con letra" className="w-full bg-slate-50 p-4 rounded-2xl outline-none border border-slate-100" />
                </div>
                <button type="submit" className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl mb-4">Entrar</button>
                <button type="button" onClick={() => setIsAdminMode(true)} className="w-full text-blue-600 font-bold text-[10px] uppercase">Panel de Gestión</button>
              </form>
            </div>
          );
        }

        if (isAdminMode) {
          return (
            <div className="h-screen bg-slate-900 text-white p-8 flex flex-col items-center justify-center">
              <div className="w-full max-w-sm">
                <button onClick={() => setIsAdminMode(false)} className="mb-8 text-slate-400 text-sm">← Volver</button>
                {!isAdminAuth ? (
                  <div className="space-y-4">
                    <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} placeholder="Clave de Centro" className="w-full bg-slate-800 p-4 rounded-2xl text-center" />
                    <button onClick={() => adminPass === 'odilea21' ? setIsAdminAuth(true) : showToast("Error", "error")} className="w-full bg-blue-600 py-4 rounded-2xl font-bold">Validar</button>
                  </div>
                ) : (
                  <div className="space-y-4 text-center">
                    <p className="text-xs text-slate-400 uppercase font-black mb-4">Cargar base de datos</p>
                    <label className="block w-full bg-slate-800 p-6 rounded-2xl border-2 border-dashed border-slate-700 cursor-pointer">
                       Subir Alumnado (PDF)
                       <input type="file" className="hidden" onChange={e => showToast("Procesando...", "info")} />
                    </label>
                  </div>
                )}
              </div>
            </div>
          );
        }

        return (
          <div className="h-screen flex flex-col max-w-md mx-auto bg-white">
            {toast && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl">{toast.text}</div>}
            
            <header className="p-6 border-b border-slate-100 flex justify-between items-center">
              <div>
                <h2 className="text-xl font-black">IES ODIEL</h2>
                <p className="text-[10px] text-blue-600 font-bold uppercase">{teacherProfile.name.split(',')[0]}</p>
              </div>
              <button onClick={() => setTeacherProfile(null)} className="text-slate-300 text-xs font-bold uppercase">Cerrar</button>
            </header>

            <nav className="flex p-4 gap-2 bg-slate-50">
              <button onClick={() => setActiveTab('list')} className={`flex-1 py-3 text-[10px] font-black rounded-xl uppercase ${activeTab === 'list' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>Alumnos</button>
              <button onClick={() => setActiveTab('history')} className={`flex-1 py-3 text-[10px] font-black rounded-xl uppercase ${activeTab === 'history' ? 'bg-slate-900 text-white' : 'text-slate-400'}`}>Hoy</button>
            </nav>

            <main className="flex-1 overflow-y-auto p-4 no-scrollbar">
              {activeTab === 'list' ? (
                <div className="space-y-4">
                  <div className="space-y-2">
                    <select value={selectedUnit} onChange={e => setSelectedUnit(e.target.value)} className="w-full bg-slate-100 p-4 rounded-2xl outline-none font-bold text-sm">
                      <option value="">Todos los grupos</option>
                      {units.map(u => <option key={u} value={u}>{u}</option>)}
                    </select>
                    <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Buscar alumno..." className="w-full bg-slate-100 p-4 rounded-2xl outline-none font-bold text-sm" />
                  </div>
                  <div className="grid gap-2">
                    {filteredStudents.map(s => (
                      <div key={s.id} className="bg-white border border-slate-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                        <div className="truncate pr-2">
                          <p className="text-xs font-bold uppercase truncate">{s.name}</p>
                          <p className="text-[9px] text-slate-400 font-black">{s.unit}</p>
                        </div>
                        <div className="flex gap-1">
                          <button onClick={() => registerExit(s.id, 'baño')} className="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl font-bold">🚻</button>
                          <button onClick={() => registerExit(s.id, 'otros')} className="w-10 h-10 bg-slate-100 text-slate-400 rounded-xl font-bold">📌</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  {records.map(r => (
                    <div key={r.id} className="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl">
                      <span className="font-black text-xs text-slate-400">{new Date(r.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                      <div className="flex-1 min-w-0">
                        <p className="text-xs font-bold uppercase truncate">{students.find(x => x.id === r.studentId)?.name || 'Alumno'}</p>
                        <p className="text-[9px] text-slate-400 font-bold uppercase">De: {r.teacherName.split(',')[0]}</p>
                      </div>
                      <button onClick={() => deleteRecord(r.id)} className="text-slate-300">✕</button>
                    </div>
                  ))}
                </div>
              )}
            </main>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }

    if (window.FirebaseAPI) initReactApp();
    else window.addEventListener('firebaseReady', initReactApp);
  </script>
</body>
</html>
