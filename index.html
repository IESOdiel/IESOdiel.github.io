        const ShieldAlert = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

        const Lock = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const Calendar = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const Settings = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.96 1.41.96h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const LogOut = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const HistoryIcon = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const BarChart = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;

        // --- FUNCIONES DE APOYO Y SOPORTE TÉCNICO (SOURCE CONTEXT) ---
        const removeAccents = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

        const formatDisplayName = (fullName) => {
            if (!fullName) return "";
            if (fullName.includes(',')) {
                const parts = fullName.split(',');
                return `${parts[1].trim()} ${parts[0].trim()}`;
            }
            return fullName;
        };

        const standardizeUnitCode = (text) => {
            if (!text) return "";
            let s = removeAccents(text.toUpperCase()).replace(/[^A-Z0-9]/g, '');
            s = s.replace(/BACHILLERATO/g, 'BAC').replace(/BACH/g, 'BAC')
                .replace(/BCHTO/g, 'BAC').replace(/BTO/g, 'BAC')
                .replace(/BHCS/g, 'BAC').replace(/BCT/g, 'BAC')
                .replace(/BCG/g, 'BAC').replace(/BCA/g, 'BAC').replace(/BAM/g, 'BAC');
            s = s.replace(/EDUCACIONSECUNDARIAOBLIGATORIA/g, 'ESO');
            s = s.replace(/PRIMERO/g, '1').replace(/SEGUNDO/g, '2').replace(/TERCERO/g, '3').replace(/CUARTO/g, '4');
            return s;
        };

        const parseUnitInfo = (u) => {
            if (!u) return { full: '', level: '', group: '' };
            const cleanU = u.trim();
            const match = cleanU.match(/^(.*?)[-\s]+([a-zA-Z0-9])$/);
            if (match) return { full: cleanU, level: match[1].trim(), group: match[2].toUpperCase() };
            return { full: cleanU, level: cleanU, group: '' };
        };

        const normalizeTeacherName = (name) => {
            if (!name) return "";
            let clean = name.split('-')[0].split('(')[0];
            return removeAccents(clean).replace(/[^a-zA-Z]/g, '').toUpperCase();
        };

        const TIME_SLOTS = [
            { id: 1, start: '08:30', end: '09:30' },
            { id: 2, start: '09:30', end: '10:30' },
            { id: 3, start: '10:30', end: '11:30' },
            { id: 4, start: '12:00', end: '13:00' },
            { id: 5, start: '13:00', end: '14:00' },
            { id: 6, start: '14:00', end: '15:00' }
        ];

        // --- PARSERS DE ADMINISTRACIÓN ---
        const parsePDF = async (file) => {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let rows = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                let yRows = {};
                content.items.forEach(item => {
                    const str = item.str.trim();
                    if (!str) return;
                    const y = Math.round(item.transform[5] / 5) * 5;
                    if (!yRows[y]) yRows[y] = [];
                    yRows[y].push(item);
                });
                const sortedY = Object.keys(yRows).sort((a, b) => b - a);
                sortedY.forEach(y => {
                    const items = yRows[y].sort((a, b) => a.transform[4] - b.transform[4]);
                    let rowArr = [];
                    let currentCell = items[0].str.trim();
                    let lastX = items[0].transform[4];
                    let lastWidth = items[0].width;
                    for (let j = 1; j < items.length; j++) {
                        const item = items[j];
                        const x = item.transform[4];
                        if ((x - (lastX + lastWidth)) > 15) {
                            rowArr.push(currentCell);
                            currentCell = item.str.trim();
                        } else {
                            currentCell += ' ' + item.str.trim();
                        }
                        lastX = x; lastWidth = item.width || 0;
                    }
                    rowArr.push(currentCell);
                    rows.push(rowArr.map(c => c.replace(/\s+/g, ' ')));
                });
            }
            return rows;
        };

        function parseCSVText(text, delimiter = ',') {
            let result = [], row = [], inQuotes = false, value = '';
            text = text.replace(/^\uFEFF/, '');
            for (let i = 0; i < text.length; i++) {
                let char = text[i], nextChar = text[i+1];
                if (char === '"') {
                    if (inQuotes && nextChar === '"') { value += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === delimiter && !inQuotes) {
                    row.push(value.trim()); value = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++;
                    row.push(value.trim());
                    if (row.some(c => c !== '')) result.push(row);
                    row = []; value = '';
                } else { value += char; }
            }
            if (value || row.length > 0) {
                row.push(value.trim());
                if (row.some(c => c !== '')) result.push(row);
            }
            return result;
        }

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const { 
                initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
                getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs, query, where,
                firebaseConfig
            } = window.FirebaseAPI;

            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [teacherProfile, setTeacherProfile] = useState(null);
            const [students, setStudents] = useState([]);
            const [teachersDB, setTeachersDB] = useState({});
            const [globalSchedules, setGlobalSchedules] = useState({});
            const [activeTab, setActiveTab] = useState('pasillos');
            const [isRetroMode, setIsRetroMode] = useState(false);
            const [retroDateTime, setRetroDateTime] = useState("");
            
            const [selectedUnit, setSelectedUnit] = useState("");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [history, setHistory] = useState([]);
            const [historyDate, setHistoryDate] = useState(new Date().toISOString().split('T')[0]);

            const [activeCallStudent, setActiveCallStudent] = useState(null);
            const [activeOtherStudent, setActiveOtherStudent] = useState(null);
            const [notesInput, setNotesInput] = useState("");

            const [reportUnit, setReportUnit] = useState("Todos los cursos");
            const [reportStart, setReportStart] = useState("");
            const [reportEnd, setReportEnd] = useState(new Date().toISOString().split('T')[0]);
            const [reportData, setReportData] = useState([]);
            const [isLoading, setIsLoading] = useState(false);

            const appId = "ies-odiel-app";

            useEffect(() => {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const firestore = getFirestore(app);
                setDb(firestore);

                signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => setUser(u));
            }, []);

            useEffect(() => {
                if (!db || !user) return;
                
                const unsubStudents = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => {
                    if (s.exists()) setStudents(s.data().list || []);
                });

                const unsubTeachers = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => {
                    if (s.exists()) setTeachersDB(s.data().list || {});
                });

                const unsubHistory = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`), (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data(), datePartition: historyDate }));
                    setHistory(data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });

                getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active')).then(s => {
                    if (s.exists()) setTeacherProfile(s.data());
                });

                return () => { unsubStudents(); unsubTeachers(); unsubHistory(); };
            }, [db, user, historyDate]);

            // Lógica Filtrado Pasillos (Ignore strictly if no unit)
            const filteredStudents = useMemo(() => {
                return students.filter(s => {
                    if (!s.unit) return false;
                    const matchesUnit = selectedUnit === "" || s.unit === selectedUnit;
                    const normSearch = removeAccents(searchTerm.toLowerCase());
                    const matchesSearch = removeAccents(s.name.toLowerCase()).includes(normSearch);
                    return matchesUnit && matchesSearch;
                });
            }, [students, selectedUnit, searchTerm]);

            const availableUnits = useMemo(() => {
                return [...new Set(students.map(s => s.unit))].filter(Boolean).sort();
            }, [students]);

            const registerBreak = async (studentId, reason, notes = "") => {
                const now = isRetroMode && retroDateTime ? new Date(retroDateTime) : new Date();
                const datePartition = now.toISOString().split('T')[0];
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${datePartition}`), {
                        studentId,
                        teacherName: teacherProfile.name,
                        timestamp: now.toISOString(),
                        isRetroactive: isRetroMode,
                        reason,
                        notes
                    });
                    
                    setActiveCallStudent(null);
                    setActiveOtherStudent(null);
                    setNotesInput("");
                    if(isRetroMode) setIsRetroMode(false);
                } catch (e) {
                    alert("Error en el registro: " + e.message);
                }
            };

            const handleGenerateReport = async () => {
                setIsLoading(true);
                let allRecords = [];
                const start = new Date(reportStart || "2024-09-01");
                const end = new Date(reportEnd);
                
                let current = new Date(start);
                while (current <= end) {
                    const dateStr = current.toISOString().split('T')[0];
                    const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${dateStr}`));
                    snap.forEach(d => {
                        const rec = d.data();
                        const student = students.find(s => s.id === rec.studentId);
                        if (reportUnit === "Todos los cursos" || (student && student.unit === reportUnit)) {
                            allRecords.push({ ...rec, studentName: student ? student.name : "Desconocido", unit: student ? student.unit : "?" });
                        }
                    });
                    current.setDate(current.getDate() + 1);
                }
                setReportData(allRecords.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                setIsLoading(false);
            };

            // ADMINISTRACIÓN: CARGA DE DATOS (FULL IMPLEMENTATION)
            const handleUploadStudents = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsLoading(true);
                try {
                    let rows = file.name.toLowerCase().endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text(), ',');
                    let headerIdx = rows.findIndex(row => row.some(c => removeAccents(c.toLowerCase()).includes('alumno')));
                    if (headerIdx === -1) headerIdx = 0;

                    const nameIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('alumno'));
                    const unitIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('unidad'));
                    const tlfIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('telefono'));
                    const urgIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('urgencia'));
                    const t1Idx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('primer tutor'));
                    const t2Idx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('segundo'));

                    const result = rows.slice(headerIdx + 1).map((row, idx) => {
                        if (!row[nameIdx]) return null;
                        return {
                            id: `std_${idx}_${Date.now()}`,
                            name: row[nameIdx].trim(),
                            unit: row[unitIdx] ? row[unitIdx].trim() : "",
                            tlf: row[tlfIdx] || "",
                            tlfUrgencia: row[urgIdx] || "",
                            tlf1Tutor: row[t1Idx] || "",
                            tlf2Tutor: row[t2Idx] || ""
                        };
                    }).filter(s => s && s.name);

                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), { list: result });
                    alert("Alumnado actualizado correctamente");
                } catch (err) { alert("Error al procesar: " + err.message); }
                setIsLoading(false);
            };

            const handleUploadTeachers = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsLoading(true);
                try {
                    let rows = file.name.toLowerCase().endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text(), ',');
                    let headerIdx = rows.findIndex(row => row.some(c => removeAccents(c.toLowerCase()).includes('idea')));
                    if (headerIdx === -1) headerIdx = 0;

                    const nameIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('empleado') || removeAccents(c.toLowerCase()).includes('nombre'));
                    const ideaIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('idea'));
                    const dniIdx = rows[headerIdx].findIndex(c => removeAccents(c.toLowerCase()).includes('dni'));

                    const result = {};
                    rows.slice(headerIdx + 1).forEach(row => {
                        if (row[ideaIdx] && row[dniIdx]) {
                            result[row[ideaIdx].trim().toLowerCase()] = {
                                name: row[nameIdx].trim(),
                                dni: row[dniIdx].trim().toUpperCase()
                            };
                        }
                    });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), { list: result });
                    alert("Profesorado actualizado correctamente");
                } catch (err) { alert("Error al procesar profesorado: " + err.message); }
                setIsLoading(false);
            };

            if (!teacherProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <form onSubmit={async (e) => {
                            e.preventDefault();
                            const idea = e.target.idea.value.trim().toLowerCase();
                            const dni = e.target.dni.value.trim().toUpperCase();
                            const t = teachersDB[idea];
                            if (t && t.dni === dni) {
                                const profile = { name: t.name, idea };
                                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), profile);
                                setTeacherProfile(profile);
                            } else alert("Credenciales inválidas");
                        }} className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-200">
                            <h1 className="text-2xl font-bold text-blue-800 mb-2 text-center">IES Odiel</h1>
                            <p className="text-slate-500 text-sm mb-6 text-center">Acceso Control Pasillos</p>
                            <input name="idea" placeholder="Usuario IdEA" className="w-full mb-3 p-3 rounded-xl border border-slate-300 outline-none focus:ring-2 ring-blue-500" required />
                            <input name="dni" type="password" placeholder="DNI" className="w-full mb-6 p-3 rounded-xl border border-slate-300 outline-none focus:ring-2 ring-blue-500" required />
                            <button className="w-full bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-800 transition-colors">Entrar</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-2xl mx-auto bg-white shadow-2xl overflow-hidden">
                    <header className="bg-blue-800 text-white p-4 shadow-lg shrink-0">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="font-bold text-lg">IES Odiel</h1>
                                <p className="text-[10px] opacity-80">{formatDisplayName(teacherProfile.name)}</p>
                            </div>
                            <button onClick={() => setTeacherProfile(null)} className="p-2 bg-blue-900 rounded-lg hover:bg-red-800 transition-colors">
                                <LogOut size={18} />
                            </button>
                        </div>
                        <nav className="flex gap-2">
                            {['pasillos', 'historial', 'informes', 'admin'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 text-[10px] font-bold rounded-xl transition-all ${activeTab === tab ? 'bg-white text-blue-800' : 'bg-blue-700'}`}>
                                    {tab.toUpperCase()}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="flex-1 overflow-y-auto custom-scrollbar p-4 relative">
                        {activeTab === 'pasillos' && (
                            <div className="space-y-4">
                                <div className="sticky top-0 bg-white pb-2 z-10 space-y-3">
                                    <select className="w-full p-3 bg-slate-100 border rounded-2xl text-sm font-bold" value={selectedUnit} onChange={(e) => setSelectedUnit(e.target.value)}>
                                        <option value="">Todas las unidades</option>
                                        {availableUnits.map(u => <option key={u} value={u}>{u}</option>)}
                                    </select>
                                    <div className="relative">
                                        <Search className="absolute left-3 top-3 text-slate-400" size={18} />
                                        <input placeholder="Buscar alumno..." className="w-full pl-10 p-3 bg-slate-50 border rounded-2xl text-sm" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                    <button onClick={() => setIsRetroMode(!isRetroMode)} className={`w-full py-2 text-[10px] font-bold rounded-lg border ${isRetroMode ? 'bg-amber-100 border-amber-300 text-amber-800' : 'bg-slate-50 text-slate-500'}`}>
                                        {isRetroMode ? "MODO RETROACTIVO ACTIVADO" : "REGISTRAR SALIDA PASADA"}
                                    </button>
                                    {isRetroMode && <input type="datetime-local" className="w-full p-2 border rounded-lg text-sm" value={retroDateTime} onChange={(e) => setRetroDateTime(e.target.value)} />}
                                </div>
                                <div className="space-y-2">
                                    {filteredStudents.map(student => (
                                        <div key={student.id} className="bg-white border p-4 rounded-3xl shadow-sm flex items-center justify-between gap-4">
                                            <div className="flex-1 min-w-0">
                                                <p className="font-bold text-sm text-slate-800 truncate">{student.name}</p>
                                                <p className="text-[10px] text-slate-400 font-bold uppercase">{student.unit}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => registerBreak(student.id, "Baño")} className="p-3 bg-blue-50 text-blue-700 rounded-2xl"><WCIcon /></button>
                                                <button onClick={() => registerBreak(student.id, "Enfermedad")} className="p-3 bg-red-50 text-red-700 rounded-2xl"><MedicalCross /></button>
                                                <button onClick={() => setActiveCallStudent(student)} className="p-3 bg-emerald-50 text-emerald-700 rounded-2xl"><Phone /></button>
                                                <button onClick={() => setActiveOtherStudent(student)} className="p-3 bg-slate-50 text-slate-700 rounded-2xl"><HelpCircle /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'historial' && (
                            <div className="space-y-4">
                                <div className="flex items-center justify-between sticky top-0 bg-white pb-2">
                                    <h2 className="font-bold text-slate-500 text-sm uppercase">Registros:</h2>
                                    <input type="date" className="p-2 border rounded-xl text-sm" value={historyDate} onChange={(e) => setHistoryDate(e.target.value)} />
                                </div>
                                <div className="space-y-2">
                                    {history.map(record => {
                                        const s = students.find(x => x.id === record.studentId);
                                        const canDelete = record.teacherName === teacherProfile.name;
                                        return (
                                            <div key={record.id} className="p-4 bg-slate-50 rounded-2xl border flex items-center justify-between">
                                                <div className="flex-1">
                                                    <p className="font-bold text-sm">{s ? `${s.name} (${s.unit})` : 'Desconocido'}</p>
                                                    <p className="text-[10px] text-slate-500">{new Date(record.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - {record.reason}</p>
                                                    {record.notes && <p className="text-[10px] italic text-blue-600 mt-1">Nota: {record.notes}</p>}
                                                </div>
                                                {canDelete && (
                                                    <button onClick={async () => {
                                                        if(confirm("¿Eliminar registro?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`, record.id));
                                                    }} className="p-2 text-red-300 hover:text-red-600"><Trash2 size={18}/></button>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'informes' && (
                            <div className="space-y-4">
                                <div className="bg-slate-50 p-4 rounded-3xl border space-y-3">
                                    <select className="w-full p-3 rounded-xl border text-sm" value={reportUnit} onChange={(e) => setReportUnit(e.target.value)}>
                                        <option>Todos los cursos</option>
                                        {availableUnits.map(u => <option key={u}>{u}</option>)}
                                    </select>
                                    <div className="flex gap-2">
                                        <input type="date" className="flex-1 p-3 rounded-xl border text-sm" onChange={(e) => setReportStart(e.target.value)} />
                                        <input type="date" className="flex-1 p-3 rounded-xl border text-sm" value={reportEnd} onChange={(e) => setReportEnd(e.target.value)} />
                                    </div>
                                    <button onClick={handleGenerateReport} disabled={isLoading} className="w-full bg-blue-800 text-white py-3 rounded-xl font-bold">
                                        {isLoading ? "Cargando..." : "Generar Informe"}
                                    </button>
                                </div>
                                <div className="space-y-2">
                                    {reportData.map((r, i) => (
                                        <div key={i} className="p-3 bg-white border rounded-xl text-xs flex justify-between items-center">
                                            <div>
                                                <span className="font-bold">{r.studentName}</span> <span className="text-slate-400">({r.unit})</span>
                                                <p className="text-[10px] text-slate-500">{new Date(r.timestamp).toLocaleDateString()} - {r.reason}</p>
                                                {r.notes && <p className="text-[9px] text-blue-500">{r.notes}</p>}
                                            </div>
                                            <span className="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">{r.reason}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-6">
                                <h2 className="font-bold text-slate-800 border-b pb-2">Panel Administrativo</h2>
                                <div className="space-y-4">
                                    <div className="p-4 bg-white border rounded-3xl shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-3 uppercase">Base Alumnado (RegAlum.pdf)</p>
                                        <input type="file" className="text-xs w-full" onChange={handleUploadStudents} />
                                    </div>
                                    <div className="p-4 bg-white border rounded-3xl shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-3 uppercase">Base Profesorado (IdEA / DNI)</p>
                                        <input type="file" className="text-xs w-full" onChange={handleUploadTeachers} />
                                    </div>
                                    <div className="p-4 bg-white border rounded-3xl shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 mb-3 uppercase">Horarios GHC (HTML / CSV)</p>
                                        <input type="file" className="text-xs w-full" />
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {activeCallStudent && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="font-bold text-lg">Llamar a {activeCallStudent.name}</h3>
                                    <button onClick={() => setActiveCallStudent(null)}><X /></button>
                                </div>
                                <div className="space-y-2 mb-4">
                                    {[
                                        { label: "Personal", num: activeCallStudent.tlf },
                                        { label: "Urgencia", num: activeCallStudent.tlfUrgencia },
                                        { label: "Tutor 1", num: activeCallStudent.tlf1Tutor },
                                        { label: "Tutor 2", num: activeCallStudent.tlf2Tutor }
                                    ].filter(x => x.num && x.num.trim() !== "").map((p, i) => (
                                        <a key={i} href={`tel:${p.num}`} className="flex items-center justify-between p-4 bg-emerald-50 text-emerald-800 rounded-2xl border hover:bg-emerald-100">
                                            <span className="text-[10px] font-bold uppercase">{p.label}</span>
                                            <span className="font-mono font-bold">{p.num}</span>
                                            <Phone size={18} />
                                        </a>
                                    ))}
                                </div>
                                <textarea className="w-full p-3 bg-slate-100 rounded-2xl text-sm mb-4 outline-none" placeholder="Notas de la llamada..." value={notesInput} onChange={(e) => setNotesInput(e.target.value)} />
                                <button onClick={() => registerBreak(activeCallStudent.id, "Llamada", notesInput)} className="w-full bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg">Guardar Registro Llamada</button>
                            </div>
                        </div>
                    )}

                    {activeOtherStudent && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold">Indicar Motivo</h3>
                                    <button onClick={() => setActiveOtherStudent(null)}><X /></button>
                                </div>
                                <input autoFocus className="w-full p-4 bg-slate-100 rounded-2xl text-sm mb-4 border focus:border-blue-500" placeholder="Ej: Jefatura, Conserjería..." value={notesInput} onChange={(e) => setNotesInput(e.target.value)} />
                                <button onClick={() => registerBreak(activeOtherStudent.id, "Otros", notesInput)} className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl">Confirmar Salida</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
