    <!-- Módulo de Inicialización Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,

    <!-- Aplicación React -->
    <script type="text/babel">
        function initReactApp() {
            const { useState, useMemo, useEffect, useRef } = React;
            const {
                initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
                getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs, query, orderBy
            } = window.FirebaseAPI;

            const firebaseConfig = {
                apiKey: "AIzaSyCeQ6so402oADraHknUMMdB95zLtz8hNd8",
                authDomain: "control-de-pasillos.firebaseapp.com",
                projectId: "control-de-pasillos",
                storageBucket: "control-de-pasillos.firebasestorage.app",
                messagingSenderId: "869022506837",
                appId: "1:869022506837:web:d3d91eb5cfd8b66d2019dc",
                measurementId: "G-X15S8NJVQV"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "ies-odiel-app";

            // --- COMPONENTES ICONOS SVG ---
            const Search = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
            const Clock = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
            const CheckCircle = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
            const ShieldAlert = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
            const X = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
            const Lock = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
            const Calendar = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
            const Settings = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.96 1.41.96h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
            const LogOut = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
            const HistoryIcon = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
            const CalendarClock = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><path d="M22 16a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z"/></svg>;
            const Trash2 = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
            const Info = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
            const BarChart = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
            const FileText = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
            const Phone = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
            const Bath = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6a2 2 0 1 1 4 0 2 2 0 0 1-4 0ZM7 12V9a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v3M5 20h14a2 2 0 0 0 2-2v-5H3v5a2 2 0 0 0 2 2Z"/></svg>;
            const Medkit = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M8 2h8v4H8zM12 10v6M9 13h6"/></svg>;
            const HelpCircle = ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>;

            // --- FUNCIONES DE APOYO ---
            const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const formatDisplayName = (fullName) => {
                if (!fullName) return "";
                if (fullName.includes(',')) {
                    const parts = fullName.split(',');
                    return `${parts[1].trim()} ${parts[0].trim()}`;
                }
                return fullName;
            };

            const parsePDF = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let rows = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    let yRows = {};
                    content.items.forEach(item => {
                        const str = item.str.trim();
                        if (!str) return;
                        const y = Math.round(item.transform[5] / 5) * 5;
                        if (!yRows[y]) yRows[y] = [];
                        yRows[y].push(item);
                    });
                    const sortedY = Object.keys(yRows).sort((a, b) => b - a);
                    sortedY.forEach(y => {
                        const items = yRows[y].sort((a, b) => a.transform[4] - b.transform[4]);
                        let rowArr = [];
                        let currentCell = items[0].str.trim();
                        let lastX = items[0].transform[4];
                        let lastWidth = items[0].width;
                        for (let j = 1; j < items.length; j++) {
                            const item = items[j];
                            const x = item.transform[4];
                            if ((x - (lastX + lastWidth)) > 15) {
                                rowArr.push(currentCell);
                                currentCell = item.str.trim();
                            } else { currentCell += ' ' + item.str.trim(); }
                            lastX = x;
                            lastWidth = item.width || 0;
                        }
                        rowArr.push(currentCell);
                        rows.push(rowArr.map(c => c.replace(/\s+/g, ' ')));
                    });
                }
                return rows;
            };

            function parseCSVText(text, delimiter = ',') {
                let result = [], row = [], inQuotes = false, value = '';
                text = text.replace(/^\uFEFF/, '');
                for (let i = 0; i < text.length; i++) {
                    let char = text[i], nextChar = text[i+1];
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') { value += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === delimiter && !inQuotes) {
                        row.push(value.trim()); value = '';
                    } else if ((char === '\n' || char === '\r') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') i++;
                        row.push(value.trim());
                        if (row.some(c => c !== '')) result.push(row);
                        row = []; value = '';
                    } else { value += char; }
                }
                if (value || row.length > 0) {
                    row.push(value.trim());
                    if (row.some(c => c !== '')) result.push(row);
                }
                return result;
            }

            const normalizeTeacherName = (name) => {
                if (!name) return "";
                let clean = name.split('-')[0].split('(')[0];
                return removeAccents(clean).replace(/[^a-zA-Z]/g, '').toUpperCase();
            };

            const parseUnitInfo = (u) => {
                if (!u) return { full: '', level: '', group: '' };
                const cleanU = u.trim();
                const match = cleanU.match(/^(.*?)[-\s]+([a-zA-Z0-9])$/);
                if (match) return { full: cleanU, level: match[1].trim(), group: match[2].toUpperCase() };
                return { full: cleanU, level: cleanU, group: '' };
            };

            const standardizeUnitCode = (text) => {
                if (!text) return "";
                let s = removeAccents(text.toUpperCase()).replace(/[^A-Z0-9]/g, '');
                s = s.replace(/BACHILLERATO|BACH|BCHTO|BTO|BHCS|BCT|BCG|BCA|BAM/g, 'BAC');
                s = s.replace(/EDUCACIONSECUNDARIAOBLIGATORIA/g, 'ESO');
                s = s.replace(/PRIMERO/g, '1').replace(/SEGUNDO/g, '2').replace(/TERCERO/g, '3').replace(/CUARTO/g, '4');
                return s;
            };

            const TIME_SLOTS = [
                { id: 1, start: '08:30', end: '09:30' },
                { id: 2, start: '09:30', end: '10:30' },
                { id: 3, start: '10:30', end: '11:30' },
                { id: 4, start: '12:00', end: '13:00' },
                { id: 5, start: '13:00', end: '14:00' },
                { id: 6, start: '14:00', end: '15:00' }
            ];

            // --- COMPONENTE APP ---
            function App() {
                const [user, setUser] = useState(null);
                const [isInitializing, setIsInitializing] = useState(true);
                const [students, setStudents] = useState([]);
                const [teachersDB, setTeachersDB] = useState({});
                const [globalSchedules, setGlobalSchedules] = useState({});
                const [teacherProfile, setTeacherProfile] = useState(null);
                const [activeTab, setActiveTab] = useState('list');
                const [searchTerm, setSearchTerm] = useState('');
                const [selectedUnit, setSelectedUnit] = useState('');
                const [isRetroMode, setIsRetroMode] = useState(false);
                const [retroDateTime, setRetroDateTime] = useState('');
                const [historyDate, setHistoryDate] = useState(new Date().toISOString().split('T')[0]);
                const [historyRecords, setHistoryRecords] = useState([]);
                const [todayRecords, setTodayRecords] = useState([]);
                const [toastMsg, setToastMsg] = useState('');
                const [recordToDelete, setRecordToDelete] = useState(null);
                const [callModal, setCallModal] = useState(null);

                const [reportUnit, setReportUnit] = useState('');
                const [reportStudentId, setReportStudentId] = useState('');
                const [reportStartDate, setReportStartDate] = useState(() => {
                    const now = new Date();
                    const year = now.getMonth() >= 8 ? now.getFullYear() : now.getFullYear() - 1;
                    return `${year}-09-01`;
                });
                const [reportEndDate, setReportEndDate] = useState(new Date().toISOString().split('T')[0]);
                const [reportRecords, setReportRecords] = useState(null);
                const [isLoadingReport, setIsLoadingReport] = useState(false);

                const [isAdminMode, setIsAdminMode] = useState(false);
                const [ideaInput, setIdeaInput] = useState('');
                const [dniPassInput, setDniPassInput] = useState('');
                const [loginError, setLoginError] = useState('');
                const [uploading, setUploading] = useState(false);

                const lastCalculatedSlot = useRef('');

                useEffect(() => {
                    signInAnonymously(auth).catch(console.error);
                    const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setIsInitializing(false); });
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (!user) return;
                    const unsubs = [
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => { if (s.exists()) setStudents(s.data().list || []); }),
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => { if (s.exists()) setTeachersDB(s.data().list || {}); }),
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), (s) => { if (s.exists()) setGlobalSchedules(s.data().list || {}); }),
                        onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), (s) => { if (s.exists() && s.data().name) setTeacherProfile(s.data()); })
                    ];
                    return () => unsubs.forEach(u => u());
                }, [user]);

                useEffect(() => {
                    if (!user) return;
                    const todayStr = new Date().toISOString().split('T')[0];
                    return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${todayStr}`), (snap) => {
                        const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        setTodayRecords(data);
                    });
                }, [user]);

                useEffect(() => {
                    if (!user) return;
                    return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`), (snap) => {
                        const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        setHistoryRecords(data);
                    });
                }, [user, historyDate]);

                useEffect(() => {
                    if (!teacherProfile || !globalSchedules || students.length === 0 || activeTab !== 'list') return;
                    const unitsList = Array.from(new Set(students.map(s => s.unit))).filter(Boolean).sort();

                    const evaluate = (targetDate) => {
                        const day = targetDate.getDay();
                        if (day < 1 || day > 5) return '';
                        const ct = targetDate.getHours() * 60 + targetDate.getMinutes();
                        let slotId = null;
                        for (const s of TIME_SLOTS) {
                            const [sh, sm] = s.start.split(':').map(Number);
                            const [eh, em] = s.end.split(':').map(Number);
                            if (ct >= sh*60+sm && ct < eh*60+em) { slotId = s.id; break; }
                        }
                        if (!slotId) return '';
                        const sk = `${day}-${slotId}`;
                        const mySched = globalSchedules[normalizeTeacherName(teacherProfile.name)];
                        if (mySched && mySched[sk]) {
                            const cell = mySched[sk].toUpperCase();
                            if (cell.includes("GUARDIA")) return '';
                            const normCell = standardizeUnitCode(cell);
                            return unitsList.find(u => normCell.includes(standardizeUnitCode(u))) || '';
                        }
                        return '';
                    };

                    if (isRetroMode && retroDateTime) {
                        setSelectedUnit(evaluate(new Date(retroDateTime)));
                    } else if (!isRetroMode) {
                        const unit = evaluate(new Date());
                        if (unit) setSelectedUnit(unit);
                    }
                }, [teacherProfile, globalSchedules, students, activeTab, isRetroMode, retroDateTime]);

                const registerBreak = async (studentId, reason, callTarget = null, notes = null) => {
                    if (!user || !teacherProfile) return;
                    const timestamp = (isRetroMode && retroDateTime) ? new Date(retroDateTime).toISOString() : new Date().toISOString();
                    const datePartition = timestamp.split('T')[0];
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${datePartition}`), {
                            studentId,
                            teacherName: teacherProfile.name,
                            timestamp,
                            isRetroactive: isRetroMode,
                            reason,
                            callTarget,
                            notes
                        });
                        setToastMsg(`✅ ${reason} registrado.`);
                        if (isRetroMode) { setIsRetroMode(false); setRetroDateTime(''); }
                    } catch (e) { setToastMsg("❌ Error al guardar."); }
                };

                const units = useMemo(() => Array.from(new Set(students.map(s => s.unit))).filter(Boolean).sort(), [students]);

                const filteredStudents = useMemo(() => {
                    return students.filter(s => {
                        const matchUnit = selectedUnit ? s.unit === selectedUnit : true;
                        const matchSearch = searchTerm ? removeAccents(s.name.toLowerCase()).includes(removeAccents(searchTerm.toLowerCase())) : true;
                        return matchUnit && matchSearch;
                    });
                }, [students, selectedUnit, searchTerm]);

                const todayStats = useMemo(() => {
                    const sIds = new Set(filteredStudents.map(s => s.id));
                    const recs = todayRecords.filter(r => sIds.has(r.studentId));
                    return {
                        total: recs.length,
                        bano: recs.filter(r => r.reason === 'Baño').length,
                        enf: recs.filter(r => r.reason === 'Enfermería').length,
                        otros: recs.filter(r => r.reason === 'Otros').length
                    };
                }, [filteredStudents, todayRecords]);

                const generateReport = async () => {
                    if (!reportUnit) return;
                    setIsLoadingReport(true);
                    try {
                        let all = [];
                        let curr = new Date(reportStartDate);
                        const end = new Date(reportEndDate);
                        const targetIds = reportStudentId ? [reportStudentId] : students.filter(s => s.unit === reportUnit).map(s => s.id);
                        while(curr <= end) {
                            const dStr = curr.toISOString().split('T')[0];
                            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${dStr}`));
                            snap.forEach(d => {
                                const data = d.data();
                                if (targetIds.includes(data.studentId)) all.push({ id: d.id, ...data });
                            });
                            curr.setDate(curr.getDate() + 1);
                        }
                        all.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                        setReportRecords(all);
                    } catch (e) { setToastMsg("❌ Error en informe."); }
                    finally { setIsLoadingReport(false); }
                };

                const handleUploadSchedules = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    setUploading(true);
                    const isHTML = file.name.toLowerCase().endsWith('.htm') || file.name.toLowerCase().endsWith('.html');
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            const text = ev.target.result;
                            const result = {};
                            if (isHTML) {
                                const parser = new DOMParser();
                                const docHTML = parser.parseFromString(text, 'text/html');
                                const htmlRows = docHTML.querySelectorAll('tr');
                                htmlRows.forEach((row) => {
                                    const cells = Array.from(row.querySelectorAll('th, td'));
                                    if (cells.length < 5) return;
                                    const rawName = cells[0].textContent.replace(/\u00A0/g, " ").trim();
                                    const normName = normalizeTeacherName(rawName);
                                    if (!normName || normName.length < 5 || rawName.toLowerCase().includes('lunes')) return;
                                    result[normName] = {};
                                    let slotIndex = 0;
                                    for (let i = 1; i < cells.length; i++) {
                                        const cell = cells[i];
                                        let colspan = parseInt(cell.getAttribute('colspan') || '1', 10);
                                        let cellText = cell.textContent.replace(/\u00A0/g, " ").trim();
                                        for (let c = 0; c < colspan; c++) {
                                            if (slotIndex < 30) {
                                                const day = Math.floor(slotIndex / 6) + 1;
                                                const slot = (slotIndex % 6) + 1;
                                                if (cellText) result[normName][`${day}-${slot}`] = cellText;
                                            }
                                            slotIndex++;
                                        }
                                    }
                                });
                            } else {
                                const rows = parseCSVText(text, text.includes(';') ? ';' : ',');
                                for (let i = 2; i < rows.length; i++) {
                                    if (!rows[i][0]) continue;
                                    const normName = normalizeTeacherName(rows[i][0]);
                                    result[normName] = {};
                                    let colIdx = 1;
                                    for (let d = 1; d <= 5; d++) {
                                        for (let s = 1; s <= 6; s++) {
                                            if (rows[i][colIdx]) result[normName][`${d}-${s}`] = rows[i][colIdx];
                                            colIdx++;
                                        }
                                    }
                                }
                            }
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), { list: result });
                            setToastMsg("✅ Horarios actualizados.");
                        } catch (err) { setToastMsg("❌ Error en horario."); }
                        finally { setUploading(false); }
                    };
                    reader.readAsText(file, "windows-1252");
                };

                if (isInitializing) return <div className="min-h-screen flex items-center justify-center text-slate-400">Iniciando sistema...</div>;

                if (!teacherProfile && !isAdminMode) {
                    return (
                        <div className="min-h-screen flex flex-col items-center justify-center p-4">
                            <button onClick={() => { const p = prompt("Contraseña:"); if(p==="odilea21") setIsAdminMode(true); }} className="absolute top-4 right-4 text-xs text-slate-400 flex items-center gap-1"><Settings size={14}/> Admin</button>
                            <form onSubmit={async (e) => {
                                e.preventDefault(); setLoginError('');
                                const t = teachersDB[ideaInput.toLowerCase()];
                                if (t && t.dni === dniPassInput.toUpperCase()) {
                                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), { idea: ideaInput, name: t.name });
                                    setTeacherProfile({ idea: ideaInput, name: t.name });
                                } else { setLoginError("Credenciales incorrectas."); }
                            }} className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                                <img src="./IES_Odiel_logo.jpg" className="w-20 mx-auto mb-4 rounded-xl border" />
                                <h1 className="text-xl font-bold mb-6">IES Odiel</h1>
                                <input type="text" placeholder="Usuario IdEA" value={ideaInput} onChange={e => setIdeaInput(e.target.value)} className="w-full p-3 border rounded-xl mb-3 outline-none focus:border-blue-500 font-mono text-center" required />
                                <input type="password" placeholder="DNI" value={dniPassInput} onChange={e => setDniPassInput(e.target.value)} className="w-full p-3 border rounded-xl mb-6 outline-none focus:border-blue-500 text-center" required />
                                <button className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-colors">Entrar</button>
                                {loginError && <p className="text-red-500 text-sm mt-4">{loginError}</p>}
                            </form>
                        </div>
                    );
                }

                if (isAdminMode) {
                    return (
                        <div className="min-h-screen bg-slate-800 p-4 flex flex-col items-center">
                            <div className="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-bold text-lg flex items-center gap-2"><Settings/> Administración</h2>
                                    <button onClick={() => setIsAdminMode(false)}><X/></button>
                                </div>
                                <div className="space-y-4">
                                    <div className="p-3 bg-slate-50 border rounded-xl space-y-2">
                                        <p className="text-xs font-bold text-slate-400 mb-1 uppercase">Actualizar Datos</p>
                                        <label className="block p-2 bg-white border border-dashed rounded-lg text-center text-sm cursor-pointer hover:border-blue-500">
                                            Subir Alumnado (.PDF/.CSV)
                                            <input type="file" className="hidden" onChange={async (e) => {
                                                const file = e.target.files[0]; if (!file) return; setUploading(true);
                                                try {
                                                    const rows = file.name.endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text());
                                                    let hIdx=-1, nIdx=-1, uIdx=-1;
                                                    for(let i=0; i<10; i++){ const r = rows[i].map(c => removeAccents(c.toLowerCase())); const ni=r.findIndex(c=>c.includes('alumno')); const ui=r.findIndex(c=>c.includes('unidad')); if(ni!==-1&&ui!==-1){ hIdx=i; nIdx=ni; uIdx=ui; break; } }
                                                    const list = rows.slice(hIdx+1).map((r,idx) => (r[nIdx] && r[uIdx]) ? {id: removeAccents(r[nIdx])+idx, name: r[nIdx], unit: r[uIdx]} : null).filter(Boolean);
                                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), { list });
                                                    setToastMsg("✅ Alumnado cargado.");
                                                } catch(e) { setToastMsg("❌ Error."); } finally { setUploading(false); }
                                            }} />
                                        </label>
                                        <label className="block p-2 bg-white border border-dashed rounded-lg text-center text-sm cursor-pointer hover:border-blue-500">
                                            Subir Profesorado (.PDF)
                                            <input type="file" className="hidden" onChange={async (e) => {
                                                const file = e.target.files[0]; if (!file) return; setUploading(true);
                                                try {
                                                    const rows = await parsePDF(file);
                                                    let hIdx=-1, nIdx=-1, iIdx=-1, dIdx=-1;
                                                    for(let i=0; i<10; i++){ const r = rows[i].map(c => removeAccents(c.toLowerCase())); const ni=r.findIndex(c=>c.includes('empleado')); const ii=r.findIndex(c=>c.includes('idea')); const di=r.findIndex(c=>c.includes('dni')); if(ni!==-1&&ii!==-1&&di!==-1){ hIdx=i; nIdx=ni; iIdx=ii; dIdx=di; break; } }
                                                    const result = {}; rows.slice(hIdx+1).forEach(r => { if(r[nIdx]&&r[iIdx]) result[r[iIdx].trim().toLowerCase()] = { name: r[nIdx].trim(), dni: r[dIdx].trim().toUpperCase() }; });
                                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), { list: result });
                                                    setToastMsg("✅ Profesores cargados.");
                                                } catch(e) { setToastMsg("❌ Error."); } finally { setUploading(false); }
                                            }} />
                                        </label>
                                        <label className="block p-2 bg-white border border-dashed rounded-lg text-center text-sm cursor-pointer hover:border-blue-500">
                                            Subir Horarios GHC (.HTML/.CSV)
                                            <input type="file" className="hidden" onChange={handleUploadSchedules} />
                                        </label>
                                    </div>
                                    <button onClick={async () => {
                                        if(!confirm("¿Borrar hoy?")) return;
                                        const dStr = new Date().toISOString().split('T')[0];
                                        const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${dStr}`));
                                        snap.forEach(d => deleteDoc(d.ref));
                                        setToastMsg("🗑️ Borrado completado.");
                                    }} className="w-full py-2 bg-red-100 text-red-600 rounded-xl text-sm font-bold">Borrado Masivo (Hoy)</button>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col max-w-md mx-auto shadow-2xl relative overflow-hidden">
                        
                        {toastMsg && (
                            <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-4 py-2 rounded-full text-sm shadow-xl flex items-center gap-2">
                                <Info size={16}/> {toastMsg}
                            </div>
                        )}

                        {recordToDelete && (
                            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white p-6 rounded-2xl w-full max-w-xs">
                                    <h3 className="font-bold mb-2">Anular permiso</h3>
                                    <p className="text-sm text-slate-500 mb-6">¿Borrar registro?</p>
                                    <div className="flex gap-2">
                                        <button onClick={() => setRecordToDelete(null)} className="flex-1 py-2 bg-slate-100 rounded-xl font-bold">No</button>
                                        <button onClick={async () => {
                                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`, recordToDelete.id));
                                            setRecordToDelete(null);
                                        }} className="flex-1 py-2 bg-red-600 text-white rounded-xl font-bold">Sí</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {callModal && (
                            <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg">Registrar Llamada</h3>
                                        <button onClick={() => setCallModal(null)}><X/></button>
                                    </div>
                                    <p className="text-xs text-slate-400 mb-4 uppercase font-bold">{callModal.studentName}</p>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 mb-1 block">Persona contactada</label>
                                            <select id="callTarget" className="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm">
                                                <option>Madre</option><option>Padre</option><option>Familiar</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 mb-1 block">Notas / Observaciones</label>
                                            <textarea id="callNotes" className="w-full p-3 bg-slate-100 rounded-xl outline-none text-sm h-24" placeholder="Indica el motivo..."></textarea>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => setCallModal(null)} className="flex-1 py-3 text-slate-400 font-bold">Cancelar</button>
                                            <button onClick={() => {
                                                const target = document.getElementById('callTarget').value;
                                                const notes = document.getElementById('callNotes').value;
                                                registerBreak(callModal.studentId, 'Llamada', target, notes);
                                                setCallModal(null);
                                            }} className="flex-1 py-3 bg-emerald-500 text-white rounded-2xl font-bold">Registrar</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <header className="bg-blue-800 text-white p-4 sticky top-0 z-20 shadow-lg">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <img src="./IES_Odiel_logo.jpg" className="w-8 h-8 rounded-full bg-white p-0.5" />
                                    <h1 className="font-bold">IES Odiel</h1>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="text-[10px] bg-blue-900/50 px-2 py-1 rounded-full">{formatDisplayName(teacherProfile?.name)}</span>
                                    <button onClick={async () => { if(confirm("¿Salir?")) { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), {}); location.reload(); } }}><LogOut size={16}/></button>
                                </div>
                            </div>
                            <div className="flex gap-1 bg-blue-900/40 p-1 rounded-xl">
                                {['list', 'history', 'report'].map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${activeTab === t ? 'bg-white text-blue-900 shadow' : 'text-blue-200'}`}>
                                        {t === 'list' ? 'Pasillos' : t === 'history' ? 'Historial' : 'Informes'}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 no-scrollbar">
                            {activeTab === 'list' && (
                                <div className="space-y-4">
                                    <div className="space-y-3 sticky top-0 z-10 bg-slate-50/90 backdrop-blur pb-2">
                                        <select value={selectedUnit} onChange={e => setSelectedUnit(e.target.value)} className="w-full p-3.5 bg-white border border-slate-200 rounded-2xl shadow-sm text-sm font-bold">
                                            <option value="">Todo el centro</option>
                                            {units.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                        <div className="relative">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Search size={18}/></div>
                                            <input type="text" placeholder="Buscar alumno..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none shadow-sm" />
                                        </div>
                                        <div className="grid grid-cols-4 gap-2">
                                            {[{L:'Total',V:todayStats.total,C:'slate'},{L:'Baño',V:todayStats.bano,C:'blue'},{L:'Enf.',V:todayStats.enf,C:'red'},{L:'Otros',V:todayStats.otros,C:'orange'}].map(s=>(
                                                <div key={s.L} className={`bg-white p-2 rounded-xl border border-${s.C}-100 text-center shadow-sm`}>
                                                    <p className={`text-lg font-black text-${s.C}-600 leading-none`}>{s.V}</p>
                                                    <p className="text-[9px] uppercase font-bold text-slate-400 mt-1">{s.L}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={() => setIsRetroMode(!isRetroMode)} className={`w-full p-3 rounded-xl text-xs font-bold flex justify-between items-center transition-all ${isRetroMode ? 'bg-purple-100 text-purple-700' : 'bg-slate-200 text-slate-600'}`}>
                                            <span className="flex items-center gap-2"><CalendarClock size={16}/> Registro Retroactivo</span>
                                            <span>{isRetroMode ? 'ON' : 'OFF'}</span>
                                        </button>
                                        {isRetroMode && <input type="datetime-local" value={retroDateTime} onChange={e => setRetroDateTime(e.target.value)} className="w-full p-2 border-2 border-purple-200 rounded-lg text-sm" />}
                                    </div>

                                    <div className="space-y-2 pb-24">
                                        {filteredStudents.map(s => {
                                            const count = todayRecords.filter(r => r.studentId === s.id).length;
                                            return (
                                                <div key={s.id} className={`bg-white p-3 rounded-2xl border shadow-sm flex items-center justify-between gap-2 ${count > 2 ? 'border-red-200 bg-red-50' : 'border-slate-100'}`}>
                                                    <div className="min-w-0 pr-2">
                                                        <h3 className="font-bold text-sm truncate">{s.name}</h3>
                                                        <p className="text-[10px] text-slate-400 font-bold">{s.unit} {count > 0 && <span className="text-red-500 ml-1">• Salidas: {count}</span>}</p>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => registerBreak(s.id, 'Baño')} className="w-10 h-10 bg-blue-50 text-blue-600 border border-blue-100 rounded-xl flex items-center justify-center"><Bath size={24}/></button>
                                                        <button onClick={() => registerBreak(s.id, 'Enfermería')} className="w-10 h-10 bg-red-50 text-red-600 border border-red-100 rounded-xl flex items-center justify-center"><Medkit size={24}/></button>
                                                        <button onClick={() => registerBreak(s.id, 'Otros')} className="w-10 h-10 bg-orange-50 text-orange-600 border border-orange-100 rounded-xl flex items-center justify-center"><HelpCircle size={24}/></button>
                                                        <button onClick={() => setCallModal({ studentId: s.id, studentName: s.name })} className="w-10 h-10 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-xl flex items-center justify-center"><Phone size={24}/></button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4 pb-24">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm border flex items-center justify-between sticky top-0 z-10">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Fecha Historial</span>
                                        <input type="date" value={historyDate} onChange={e => setHistoryDate(e.target.value)} className="p-1 font-bold text-sm outline-none" />
                                    </div>
                                    <div className="space-y-2">
                                        {historyRecords.length === 0 ? (
                                            <div className="text-center py-20 text-slate-300 flex flex-col items-center gap-2"><CheckCircle size={48}/><p>Sin registros.</p></div>
                                        ) : historyRecords.map(r => {
                                            const s = students.find(x => x.id === r.studentId);
                                            const time = new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                            const isOwner = r.teacherName === teacherProfile?.name;
                                            return (
                                                <div key={r.id} className="bg-white p-3 rounded-2xl border-l-4 border-l-blue-500 shadow-sm flex items-center justify-between">
                                                    <div className="min-w-0 flex-1 pr-2">
                                                        <p className="font-bold text-xs truncate">{s?.name || 'Desconocido'}</p>
                                                        <p className="text-[10px] text-slate-500 font-medium">
                                                            {r.reason} {r.callTarget && <span className="text-emerald-600 ml-1">({r.callTarget}) {r.notes}</span>}
                                                        </p>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <div className="text-right">
                                                            <p className="text-[10px] font-black text-slate-700 bg-slate-100 px-1.5 py-0.5 rounded">{time}</p>
                                                            <p className="text-[8px] text-slate-400 font-bold mt-0.5">{formatDisplayName(r.teacherName)}</p>
                                                        </div>
                                                        {isOwner && <button onClick={() => setRecordToDelete(r)} className="text-slate-300 hover:text-red-500"><Trash2 size={20}/></button>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'report' && (
                                <div className="space-y-4 pb-24">
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border space-y-4">
                                        <h2 className="font-black text-lg flex items-center gap-2 text-blue-800"><BarChart/> Filtros</h2>
                                        <select value={reportUnit} onChange={e => {setReportUnit(e.target.value); setReportStudentId('');}} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border">
                                            <option value="">Selecciona unidad...</option>
                                            {units.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                        {reportUnit && (
                                            <select value={reportStudentId} onChange={e => setReportStudentId(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border">
                                                <option value="">Toda la clase</option>
                                                {students.filter(s => s.unit === reportUnit).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        )}
                                        <div className="flex gap-2">
                                            <input type="date" value={reportStartDate} onChange={e => setReportStartDate(e.target.value)} className="flex-1 p-2.5 bg-slate-50 border rounded-xl text-xs font-bold" />
                                            <input type="date" value={reportEndDate} onChange={e => setReportEndDate(e.target.value)} className="flex-1 p-2.5 bg-slate-50 border rounded-xl text-xs font-bold" />
                                        </div>
                                        <button onClick={generateReport} disabled={!reportUnit || isLoadingReport} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-200 transition-all disabled:bg-slate-300">
                                            {isLoadingReport ? "Cargando..." : "Generar Informe"}
                                        </button>
                                    </div>

                                    {reportRecords && (
                                        <div className="space-y-2">
                                            {reportRecords.map(r => (
                                                <div key={r.id} className="bg-white p-3 rounded-xl border shadow-sm flex items-center justify-between">
                                                    <div className="min-w-0 flex-1">
                                                        <p className="font-bold text-xs truncate">{students.find(x => x.id === r.studentId)?.name || 'N/A'}</p>
                                                        <p className="text-[9px] text-slate-400 font-bold">
                                                            {r.reason} • {new Date(r.timestamp).toLocaleDateString()} {new Date(r.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                                                        </p>
                                                    </div>
                                                    {r.reason === 'Llamada' && <span className="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">Llamada</span>}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }

        if (window.FirebaseAPI) { initReactApp(); }
        else { window.addEventListener('firebaseReady', initReactApp); }
    </script>
</body>
</html>
