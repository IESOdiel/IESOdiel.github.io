<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Baños - IES Odiel</title>

    <!-- Dependencias Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Motor PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <!-- 1. Configuración de Firebase y Servicios -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs
        };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- 2. Lógica de Aplicación React -->
    <script type="text/babel">
        function initReactApp() {
            const { useState, useMemo, useEffect, useRef } = React;
            const {
                initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
                getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs
            } = window.FirebaseAPI;

            // Configuración del Proyecto
            const firebaseConfig = {
                apiKey: "AIzaSyCeQ6so402oADraHknUMMdB95zLtz8hNd8",
                authDomain: "control-de-pasillos.firebaseapp.com",
                projectId: "control-de-pasillos",
                storageBucket: "control-de-pasillos.firebasestorage.app",
                messagingSenderId: "869022506837",
                appId: "1:869022506837:web:d3d91eb5cfd8b66d2019dc",
                measurementId: "G-X15S8NJVQV"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = "ies-odiel-app";

            // Iconos SVG
            const Search = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
            const Clock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
            const CheckCircle = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
            const ShieldAlert = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
            const X = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
            const Lock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
            const Calendar = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
            const Settings = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.96 1.41.96h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
            const LogOut = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
            const HistoryIcon = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
            const CalendarClock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><path d="M22 16a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z"/></svg>;
            const Trash2 = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
            const Info = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
            const BarChart = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
            const FileText = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;

            // Funciones Auxiliares
            const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            const formatDisplayName = (fullName) => {
                if (!fullName) return "";
                if (fullName.includes(',')) {
                    const parts = fullName.split(',');
                    return `${parts[1].trim()} ${parts[0].trim()}`;
                }
                return fullName;
            };

            const parsePDF = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let rows = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    let yRows = {};
                    content.items.forEach(item => {
                        const str = item.str.trim();
                        if (!str) return;
                        const y = Math.round(item.transform[5] / 5) * 5;
                        if (!yRows[y]) yRows[y] = [];
                        yRows[y].push(item);
                    });
                    const sortedY = Object.keys(yRows).sort((a, b) => b - a);
                    sortedY.forEach(y => {
                        const items = yRows[y].sort((a, b) => a.transform[4] - b.transform[4]);
                        let rowArr = [];
                        let currentCell = items[0].str.trim();
                        let lastX = items[0].transform[4];
                        let lastWidth = items[0].width;
                        for (let j = 1; j < items.length; j++) {
                            const item = items[j];
                            const x = item.transform[4];
                            if ((x - (lastX + lastWidth)) > 15) {
                                rowArr.push(currentCell);
                                currentCell = item.str.trim();
                            } else {
                                currentCell += ' ' + item.str.trim();
                            }
                            lastX = x;
                            lastWidth = item.width || 0;
                        }
                        rowArr.push(currentCell);
                        rows.push(rowArr.map(c => c.replace(/\s+/g, ' ')));
                    });
                }
                return rows;
            };

            function parseCSVText(text, delimiter = ',') {
                let result = [], row = [], inQuotes = false, value = '';
                text = text.replace(/^\uFEFF/, '');
                for (let i = 0; i < text.length; i++) {
                    let char = text[i], nextChar = text[i+1];
                    if (char === '"') {
                        if (inQuotes && nextChar === '"') { value += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === delimiter && !inQuotes) {
                        row.push(value.trim()); value = '';
                    } else if ((char === '\n' || char === '\r') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') i++;
                        row.push(value.trim());
                        if (row.some(c => c !== '')) result.push(row);
                        row = []; value = '';
                    } else { value += char; }
                }
                if (value || row.length > 0) {
                    row.push(value.trim());
                    if (row.some(c => c !== '')) result.push(row);
                }
                return result;
            }

            const normalizeTeacherName = (name) => {
                if (!name) return "";
                let clean = name.split('-')[0].split('(')[0];
                return removeAccents(clean).replace(/[^a-zA-Z]/g, '').toUpperCase();
            };

            const parseUnitInfo = (u) => {
                if (!u) return { full: '', level: '', group: '' };
                const cleanU = u.trim();
                const match = cleanU.match(/^(.*?)[-\s]+([a-zA-Z0-9])$/);
                if (match) return { full: cleanU, level: match[1].trim(), group: match[2].toUpperCase() };
                return { full: cleanU, level: cleanU, group: '' };
            };

            const standardizeUnitCode = (text) => {
                if (!text) return "";
                let s = removeAccents(text.toUpperCase()).replace(/[^A-Z0-9]/g, '');
                s = s.replace(/BACHILLERATO/g, 'BAC').replace(/BACH/g, 'BAC')
                 .replace(/BCHTO/g, 'BAC').replace(/BTO/g, 'BAC')
                 .replace(/BHCS/g, 'BAC').replace(/BCT/g, 'BAC')
                 .replace(/BCG/g, 'BAC').replace(/BCA/g, 'BAC').replace(/BAM/g, 'BAC');
                s = s.replace(/EDUCACIONSECUNDARIAOBLIGATORIA/g, 'ESO');
                s = s.replace(/PRIMERO/g, '1').replace(/SEGUNDO/g, '2').replace(/TERCERO/g, '3').replace(/CUARTO/g, '4');
                return s;
            };

            const getSchoolYearStart = () => {
                const now = new Date();
                const year = now.getMonth() >= 8 ? now.getFullYear() : now.getFullYear() - 1;
                return `${year}-09-01`;
            };

            // Tramos Horarios IES Odiel
            const TIME_SLOTS = [
                { id: 1, start: '08:30', end: '09:30' },
                { id: 2, start: '09:30', end: '10:30' },
                { id: 3, start: '10:30', end: '11:30' },
                { id: 4, start: '12:00', end: '13:00' },
                { id: 5, start: '13:00', end: '14:00' },
                { id: 6, start: '14:00', end: '15:00' }
            ];

            // --- COMPONENTE APP ---
            function App() {
                const [user, setUser] = useState(null);
                const [isInitializing, setIsInitializing] = useState(true);
                const [students, setStudents] = useState([]);
                const [teachersDB, setTeachersDB] = useState({});
                const [globalSchedules, setGlobalSchedules] = useState({});
                const [teacherProfile, setTeacherProfile] = useState(null);
                const [activeTab, setActiveTab] = useState('list');
                const [searchTerm, setSearchTerm] = useState('');
                const [selectedLevel, setSelectedLevel] = useState('');
                const [selectedGroup, setSelectedGroup] = useState('');
                const [isRetroMode, setIsRetroMode] = useState(false);
                const [retroDateTime, setRetroDateTime] = useState('');
                const [historyDate, setHistoryDate] = useState(new Date().toISOString().split('T')[0]);
                const [historyRecords, setHistoryRecords] = useState([]);
                const [todayRecords, setTodayRecords] = useState([]);
                const [toastMsg, setToastMsg] = useState('');
                const [recordToDelete, setRecordToDelete] = useState(null);

                // Estados Login e Informes
                const [ideaInput, setIdeaInput] = useState('');
                const [dniPassInput, setDniPassInput] = useState('');
                const [loginError, setLoginError] = useState('');
                const [isAdminMode, setIsAdminMode] = useState(false);
                const [uploading, setUploading] = useState(false);
                const [reportUnit, setReportUnit] = useState('');
                const [reportStudentId, setReportStudentId] = useState('');
                const [reportStartDate, setReportStartDate] = useState(getSchoolYearStart());
                const [reportEndDate, setReportEndDate] = useState(new Date().toISOString().split('T')[0]);
                const [reportRecords, setReportRecords] = useState(null);
                const [isLoadingReport, setIsLoadingReport] = useState(false);
                const [deleteStartDate, setDeleteStartDate] = useState(new Date().toISOString().split('T')[0]);
                const [deleteEndDate, setDeleteEndDate] = useState(new Date().toISOString().split('T')[0]);
                const [isDeleting, setIsDeleting] = useState(false);

                const lastCalculatedSlot = useRef('');

                // Auth e Inicio
                useEffect(() => {
                    const initAuth = async () => {
                        try { await signInAnonymously(auth); } catch (err) { console.error(err); }
                    };
                    initAuth();
                    const unsubscribe = onAuthStateChanged(auth, (u) => { 
                        setUser(u); 
                        setIsInitializing(false); 
                    });
                    return () => unsubscribe();
                }, []);

                useEffect(() => {
                    if (toastMsg) {
                        const timer = setTimeout(() => setToastMsg(''), 4000);
                        return () => clearTimeout(timer);
                    }
                }, [toastMsg]);

                // Escucha de Datos en Tiempo Real
                useEffect(() => {
                    if (!user) return;
                    const unsubs = [
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => { if (s.exists()) setStudents(s.data().list || []); }),
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => { if (s.exists()) setTeachersDB(s.data().list || {}); }),
                        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), (s) => { if (s.exists()) setGlobalSchedules(s.data().list || {}); })
                    ];
                    const todayStr = new Date().toISOString().split('T')[0];
                    unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${todayStr}`), (snap) => {
                        const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        setTodayRecords(data);
                    }));
                    return () => unsubs.forEach(u => u());
                }, [user]);

                useEffect(() => {
                    if (!user) return;
                    const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`), (snap) => {
                        const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        setHistoryRecords(data);
                    });
                    return () => unsub();
                }, [user, historyDate]);

                useEffect(() => {
                    if (!user) return;
                    const loadProfile = async () => {
                        const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'));
                        if (snap.exists() && snap.data().name) setTeacherProfile(snap.data());
                    };
                    loadProfile();
                }, [user]);

                // Lógica de Niveles y Grupos
                const units = useMemo(() => Array.from(new Set(students.map(s => s.unit))).filter(Boolean).sort(), [students]);
                const parsedUnits = useMemo(() => units.map(parseUnitInfo), [units]);
                const availableLevels = useMemo(() => [...new Set(parsedUnits.map(p => p.level))].sort(), [parsedUnits]);
                const availableGroups = useMemo(() => {
                    if (!selectedLevel) return [];
                    return [...new Set(parsedUnits.filter(p => p.level === selectedLevel && p.group).map(p => p.group))].sort();
                }, [selectedLevel, parsedUnits]);

                // Lógica Horario Inteligente con Intervalo Crítico
                useEffect(() => {
                    if (!teacherProfile || !globalSchedules || units.length === 0 || activeTab !== 'list') return;

                    const evaluateSchedule = (targetDate) => {
                        const day = targetDate.getDay();
                        if (day < 1 || day > 5) return { unitStr: '', slotKey: 'weekend' };
                        const currentTime = targetDate.getHours() * 60 + targetDate.getMinutes();
                        let currentSlot = null;
                        for (const slot of TIME_SLOTS) {
                            const [startH, startM] = slot.start.split(':').map(Number);
                            const [endH, endM] = slot.end.split(':').map(Number);
                            if (currentTime >= startH * 60 + startM && currentTime < endH * 60 + endM) {
                                currentSlot = slot.id; break;
                            }
                        }
                        if (!currentSlot) return { unitStr: '', slotKey: 'out-of-hours' };
                        const slotKey = `${day}-${currentSlot}`;
                        const myNameNorm = normalizeTeacherName(teacherProfile.name);
                        const mySched = globalSchedules[myNameNorm];
                        if (mySched) {
                            const cellText = (mySched[slotKey] || "").toUpperCase();
                            if (!cellText || cellText.includes("GUARDIA")) return { unitStr: '', slotKey };
                            const normCellText = standardizeUnitCode(cellText);
                            const matchedUnits = units.filter(u => {
                                const normU = standardizeUnitCode(u);
                                return normU.length > 2 && normCellText.includes(normU);
                            });
                            if (matchedUnits.length >= 1) return { unitStr: matchedUnits[0], slotKey };
                        }
                        return { unitStr: '', slotKey };
                    };

                    const applyUnitToUI = (unitStr) => {
                        if (unitStr) {
                            const parsed = parseUnitInfo(unitStr);
                            setSelectedLevel(parsed.level);
                            setSelectedGroup(parsed.group);
                        } else {
                            setSelectedLevel('');
                            setSelectedGroup('');
                        }
                    };

                    if (isRetroMode && retroDateTime) {
                        applyUnitToUI(evaluateSchedule(new Date(retroDateTime)).unitStr);
                        lastCalculatedSlot.current = 'retro-forced';
                    } else if (!isRetroMode) {
                        const checkCurrentTime = () => {
                            const result = evaluateSchedule(new Date());
                            if (result.slotKey !== lastCalculatedSlot.current && result.slotKey !== 'out-of-hours') {
                                applyUnitToUI(result.unitStr);
                                lastCalculatedSlot.current = result.slotKey;
                            }
                        };
                        checkCurrentTime();
                        const interval = setInterval(checkCurrentTime, 60000);
                        return () => clearInterval(interval);
                    }
                }, [teacherProfile, globalSchedules, units, activeTab, isRetroMode, retroDateTime]);

                // Controladores de Acceso
                const handleAdminAccess = () => {
                    const pwd = prompt("Acceso de Administrador.\nIntroduce la contraseña:");
                    if (pwd === "odilea21") setIsAdminMode(true);
                    else if (pwd !== null) alert("Contraseña incorrecta.");
                };

                const handleLogin = async (e) => {
                    e.preventDefault();
                    setLoginError('');
                    const idea = ideaInput.trim().toLowerCase();
                    const passDNI = dniPassInput.trim().toUpperCase();
                    const teacherData = teachersDB[idea];
                    if (!teacherData || teacherData.dni !== passDNI) return setLoginError("Credenciales incorrectas.");
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), { idea, name: teacherData.name });
                    setTeacherProfile({ idea, name: teacherData.name });
                };

                const handleLogout = () => setRecordToDelete({ isLogout: true });
                const confirmLogout = async () => {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), {});
                    setTeacherProfile(null); setIdeaInput(''); setDniPassInput('');
                    setRecordToDelete(null);
                };

                // Carga Robust de Datos
                const handleUploadStudents = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    setUploading(true);
                    try {
                        let rows = file.name.endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text(), ',');
                        let headerIdx = -1, nameIdx = -1, unitIdx = -1;
                        for (let i = 0; i < Math.min(10, rows.length); i++) {
                            const r = rows[i].map(h => removeAccents(h.toLowerCase().trim()));
                            const nIdx = r.findIndex(h => h.includes('alumno') || h.includes('nombre'));
                            const uIdx = r.findIndex(h => h.includes('unidad') || h.includes('curso'));
                            if (nIdx !== -1 && uIdx !== -1) { headerIdx = i; nameIdx = nIdx; unitIdx = uIdx; break; }
                        }
                        const result = rows.slice(headerIdx + 1).map((row, idx) => {
                            const name = row[nameIdx], unit = row[unitIdx];
                            if (!name || !unit) return null;
                            return { id: removeAccents(name).replace(/\s/g,'') + '_' + idx, name, unit };
                        }).filter(Boolean).sort((a, b) => a.name.localeCompare(b.name));
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), { list: result });
                        setToastMsg(`✅ Alumnado actualizado: ${result.length} registros.`);
                    } catch (err) { setToastMsg("❌ Error: " + err.message); }
                    finally { setUploading(false); }
                };

                const handleUploadTeachers = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    setUploading(true);
                    try {
                        let rows = file.name.endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text(), ',');
                        let headerIdx = -1, nameIdx = -1, ideaIdx = -1, dniIdx = -1;
                        for (let i = 0; i < Math.min(10, rows.length); i++) {
                            const r = rows[i].map(h => removeAccents(h.toLowerCase().trim()));
                            const nIdx = r.findIndex(h => h.includes('profesor') || h.includes('nombre'));
                            const iIdx = r.findIndex(h => h.includes('idea'));
                            const dIdx = r.findIndex(h => h.includes('dni'));
                            if (nIdx !== -1 && iIdx !== -1 && dIdx !== -1) { headerIdx = i; nameIdx = nIdx; ideaIdx = iIdx; dniIdx = dIdx; break; }
                        }
                        const result = {};
                        rows.slice(headerIdx + 1).forEach(row => {
                            if (row[nameIdx] && row[ideaIdx] && row[dniIdx]) {
                                result[row[ideaIdx].trim().toLowerCase()] = { name: row[nameIdx].trim(), dni: row[dniIdx].trim().toUpperCase() };
                            }
                        });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), { list: result });
                        setToastMsg(`✅ Profesorado actualizado.`);
                    } catch (err) { setToastMsg("❌ Error: " + err.message); }
                    finally { setUploading(false); }
                };

                const handleUploadSchedules = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    setUploading(true);
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            const result = {};
                            if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                                const docHTML = new DOMParser().parseFromString(ev.target.result, 'text/html');
                                docHTML.querySelectorAll('tr').forEach(row => {
                                    const cells = Array.from(row.querySelectorAll('td, th'));
                                    if (cells.length < 5) return;
                                    const rawName = cells[0].textContent.replace(/\u00A0/g, " ").trim();
                                    const normName = normalizeTeacherName(rawName);
                                    if (!normName || rawName.toLowerCase().includes('lunes')) return;
                                    result[normName] = {};
                                    let slotIndex = 0;
                                    for (let i = 1; i < cells.length; i++) {
                                        const cell = cells[i];
                                        let colspan = parseInt(cell.getAttribute('colspan') || '1', 10);
                                        let cellHTML = cell.innerHTML.replace(/<br\s*[\/]?>/gi, " ");
                                        let tempDiv = document.createElement("div");
                                        tempDiv.innerHTML = cellHTML;
                                        let cellText = (tempDiv.textContent || "").replace(/\u00A0/g, " ").trim();
                                        for (let c = 0; c < colspan; c++) {
                                            if (slotIndex < 30 && cellText) {
                                                const day = Math.floor(slotIndex / 6) + 1;
                                                const slot = (slotIndex % 6) + 1;
                                                result[normName][`${day}-${slot}`] = cellText;
                                            }
                                            slotIndex++;
                                        }
                                    }
                                });
                            }
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), { list: result });
                            setToastMsg(`✅ Horarios importados.`);
                        } catch (err) { setToastMsg("❌ Error."); }
                        finally { setUploading(false); }
                    };
                    reader.readAsText(file, "windows-1252");
                };

                const handleMassDelete = async () => {
                    if(!confirm("¿Borrar registros del rango seleccionado? Esta acción es irreversible.")) return;
                    setIsDeleting(true);
                    try {
                        let curr = new Date(deleteStartDate), endD = new Date(deleteEndDate);
                        while(curr <= endD) {
                            const dateStr = curr.toISOString().split('T')[0];
                            const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${dateStr}`));
                            const promises = [];
                            querySnapshot.forEach(d => promises.push(deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${dateStr}`, d.id))));
                            await Promise.all(promises);
                            curr.setDate(curr.getDate() + 1);
                        }
                        setToastMsg(`✅ Registros eliminados.`);
                    } catch(e) { setToastMsg("❌ Error."); }
                    finally { setIsDeleting(false); }
                };

                // Lógica de Búsqueda y Registro
                const filteredStudents = useMemo(() => {
                    const searchTerms = removeAccents(searchTerm.toLowerCase()).trim().split(/\s+/).filter(Boolean);
                    return students.filter(s => {
                        const p = parseUnitInfo(s.unit);
                        const mLevel = selectedLevel ? p.level === selectedLevel : true;
                        const mGroup = selectedGroup ? p.group === selectedGroup : true;
                        if (!mLevel || !mGroup) return false;
                        if (searchTerms.length > 0) {
                            const normName = removeAccents(s.name.toLowerCase());
                            return searchTerms.every(term => normName.includes(term));
                        }
                        return true;
                    });
                }, [students, searchTerm, selectedLevel, selectedGroup]);

                const todayStats = useMemo(() => {
                    const ids = new Set(filteredStudents.map(s => s.id));
                    const recs = todayRecords.filter(r => ids.has(r.studentId));
                    return {
                        total: recs.length,
                        bano: recs.filter(r => r.reason === 'Baño' || !r.reason).length,
                        enf: recs.filter(r => r.reason === 'Enfermedad').length,
                        otros: recs.filter(r => r.reason === 'Otros').length
                    };
                }, [filteredStudents, todayRecords]);

                const generateReport = async () => {
                    if (!reportUnit) return setToastMsg("⚠️ Selecciona clase.");
                    setIsLoadingReport(true);
                    try {
                        const dates = [];
                        let curr = new Date(reportStartDate), endD = new Date(reportEndDate);
                        while(curr <= endD) { dates.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); }
                        const tIds = reportStudentId ? [reportStudentId] : students.filter(s => s.unit === reportUnit).map(s => s.id);
                        let allR = [];
                        const snaps = await Promise.all(dates.map(d => getDocs(collection(db, 'artifacts', appId, 'public', 'data', `records_${d}`))));
                        snaps.forEach((snap, idx) => snap.forEach(d => { 
                            if (tIds.includes(d.data().studentId)) allR.push({ id: d.id, datePartition: dates[idx], ...d.data() }); 
                        }));
                        setReportRecords(allR.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    } catch (err) { setToastMsg("❌ Error."); }
                    finally { setIsLoadingReport(false); }
                };

                const registerBreak = async (studentId, reason = 'Baño') => {
                    if (!user || !teacherProfile) return;
                    const time = (isRetroMode && retroDateTime) ? new Date(retroDateTime).toISOString() : new Date().toISOString();
                    const datePart = time.split('T')[0];
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${datePart}`), {
                            studentId, teacherName: teacherProfile.name, timestamp: time, isRetroactive: isRetroMode, reason
                        });
                        setToastMsg(isRetroMode ? "🕒 Registro manual guardado." : `✅ Permiso registrado (${reason}).`);
                        if (isRetroMode) { setIsRetroMode(false); setRetroDateTime(''); }
                    } catch (e) { setToastMsg("❌ Error de conexión."); }
                };

                const confirmDeletion = async () => {
                    if (!recordToDelete || !user) return;
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${recordToDelete.datePartition}`, recordToDelete.id));
                        setToastMsg("🗑️ Permiso anulado.");
                    } catch (e) { setToastMsg("❌ Error."); }
                    finally { setRecordToDelete(null); }
                };

                const getStyles = (count) => {
                    if (count === 0) return { bg: 'bg-white', border: 'border-slate-200', btn: 'bg-blue-50 text-blue-700 hover:bg-blue-100 border-blue-200', badge: null };
                    if (count === 1) return { bg: 'bg-yellow-50', border: 'border-yellow-300', btn: 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200 border-yellow-400', badge: 'bg-yellow-200 text-yellow-800 border-yellow-300' };
                    if (count === 2) return { bg: 'bg-orange-50', border: 'border-orange-300', btn: 'bg-orange-100 text-orange-800 hover:bg-orange-200 border-orange-400', badge: 'bg-orange-200 text-orange-800 border-orange-300' };
                    return { bg: 'bg-red-50', border: 'border-red-300', btn: 'bg-red-100 text-red-800 hover:bg-red-200 border-red-400', badge: 'bg-red-200 text-red-800 border-red-300' };
                };

                if (isInitializing) return <div className="min-h-screen bg-slate-50 flex items-center justify-center text-slate-500 font-medium">Conectando a IES Odiel...</div>;

                // UI: Administrador
                if (!teacherProfile && isAdminMode) return (
                    <div className="min-h-screen bg-slate-800 p-4 flex items-center justify-center">
                        <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-xl font-bold flex items-center gap-2 text-slate-800"><Settings size={24} /> Panel Administrador</h1>
                                <button onClick={() => setIsAdminMode(false)} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
                            </div>
                            <div className="space-y-4">
                                <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                    <h3 className="font-semibold text-sm mb-2 flex items-center gap-2">1. Alumnado <span className="text-xs bg-blue-100 text-blue-700 px-1.5 rounded">.PDF/.CSV</span></h3>
                                    <label className="cursor-pointer block text-center bg-white border-2 border-dashed border-slate-300 hover:border-blue-500 py-2 rounded-lg text-sm transition-colors">
                                        {uploading ? 'Cargando...' : 'Subir Alumnado'}
                                        <input type="file" className="hidden" onChange={handleUploadStudents} disabled={uploading} />
                                    </label>
                                </div>
                                <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                    <h3 className="font-semibold text-sm mb-2 flex items-center gap-2">2. Profesorado <span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 rounded">.PDF (IdEA+DNI)</span></h3>
                                    <label className="cursor-pointer block text-center bg-white border-2 border-dashed border-slate-300 hover:border-emerald-500 py-2 rounded-lg text-sm transition-colors">
                                        {uploading ? 'Cargando...' : 'Subir Profesorado'}
                                        <input type="file" className="hidden" onChange={handleUploadTeachers} disabled={uploading} />
                                    </label>
                                </div>
                                <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                    <h3 className="font-semibold text-sm mb-2 flex items-center gap-2">3. Horarios GHC <span className="text-xs bg-purple-100 text-purple-700 px-1.5 rounded">.HTML/.CSV</span></h3>
                                    <label className="cursor-pointer block text-center bg-white border-2 border-dashed border-slate-300 hover:border-purple-500 py-2 rounded-lg text-sm transition-colors">
                                        {uploading ? 'Cargando...' : 'Subir Horarios'}
                                        <input type="file" className="hidden" onChange={handleUploadSchedules} disabled={uploading} />
                                    </label>
                                </div>
                                <div className="p-4 bg-red-50 rounded-xl border border-red-200 mt-4">
                                    <h3 className="font-semibold text-sm text-red-800 mb-2 flex items-center gap-2"><Trash2 size={16}/> Borrado Masivo</h3>
                                    <div className="flex gap-2 mb-3">
                                        <input type="date" value={deleteStartDate} onChange={(e) => setDeleteStartDate(e.target.value)} className="flex-1 p-2 border border-red-300 rounded-md text-xs bg-white" />
                                        <input type="date" value={deleteEndDate} onChange={(e) => setDeleteEndDate(e.target.value)} className="flex-1 p-2 border border-red-300 rounded-md text-xs bg-white" />
                                    </div>
                                    <button onClick={handleMassDelete} disabled={isDeleting} className="w-full bg-red-600 hover:bg-red-700 text-white text-sm py-2.5 rounded-lg font-bold shadow-sm transition-colors">
                                        {isDeleting ? 'Borrando...' : 'Eliminar Registros'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                // UI: Login
                if (!teacherProfile) return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative">
                        <button onClick={handleAdminAccess} className="absolute top-4 right-4 text-xs text-slate-400 hover:text-slate-700 flex items-center gap-1"><Settings size={14}/> Administrador</button>
                        <form onSubmit={handleLogin} className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                            <div className="flex justify-center mb-4">
                                <img src="./IES_Odiel_logo.jpg" className="w-20 h-20 object-cover rounded-xl border border-slate-200 shadow-sm" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                <div className="hidden w-20 h-20 bg-blue-100 text-blue-600 rounded-xl items-center justify-center"><Lock size={32} /></div>
                            </div>
                            <h1 className="text-2xl font-bold mb-2 text-slate-800">IES Odiel</h1>
                            <p className="text-slate-500 mb-6 text-sm">Introduce tu Usuario IdEA y tu DNI.</p>
                            <div className="space-y-3 mb-6">
                                <input type="text" placeholder="Usuario IdEA" value={ideaInput} onChange={(e) => setIdeaInput(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 text-center font-mono lowercase" required />
                                <input type="password" placeholder="DNI" value={dniPassInput} onChange={(e) => setDniPassInput(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:border-blue-500 text-center uppercase" required />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">Acceder</button>
                            {loginError && <p className="text-red-500 text-sm mt-4 font-medium">{loginError}</p>}
                        </form>
                    </div>
                );

                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col max-w-md mx-auto shadow-2xl relative">
                        {recordToDelete && (
                            <div className="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                                <div className="bg-white p-6 rounded-2xl max-w-sm w-full shadow-2xl">
                                    <h3 className="font-bold text-lg mb-2 text-slate-800">{recordToDelete.isLogout ? '¿Cerrar sesión?' : '¿Anular permiso?'}</h3>
                                    <p className="text-slate-600 text-sm mb-6">
                                        {recordToDelete.isLogout ? 'Tendrás que volver a ingresar tus credenciales la próxima vez.' : 'Esta acción borrará el registro para todos.'}
                                    </p>
                                    <div className="flex gap-3">
                                        <button onClick={() => setRecordToDelete(null)} className="flex-1 py-3 text-sm font-bold bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors">Cancelar</button>
                                        <button onClick={recordToDelete.isLogout ? confirmLogout : confirmDeletion} className="flex-1 py-3 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors shadow-sm">
                                            {recordToDelete.isLogout ? 'Sí, salir' : 'Sí, anular'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <header className="bg-blue-800 text-white shadow-md sticky top-0 z-20">
                            <div className="p-4 pb-2">
                                <div className="flex justify-between items-center mb-3">
                                    <div className="flex items-center gap-2">
                                        <img src="./IES_Odiel_logo.jpg" className="w-8 h-8 rounded-full object-cover bg-white" onError={(e) => e.target.style.display = 'none'} />
                                        <h1 className="text-lg font-bold">IES Odiel</h1>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs bg-blue-900/50 px-2 py-1 rounded-lg truncate max-w-[150px]">{formatDisplayName(teacherProfile.name)}</span>
                                        <button onClick={handleLogout} className="text-blue-300 hover:text-white"><LogOut size={16}/></button>
                                    </div>
                                </div>
                                <div className="flex gap-1 bg-blue-900/40 p-1 rounded-lg">
                                    <button onClick={() => setActiveTab('list')} className={`flex-1 py-2 text-xs font-medium rounded-md transition-all ${activeTab === 'list' ? 'bg-white text-blue-900 shadow' : 'text-blue-100 hover:bg-blue-700'}`}>Pasillos</button>
                                    <button onClick={() => setActiveTab('history')} className={`flex-1 py-2 text-xs font-medium rounded-md transition-all flex items-center justify-center gap-1 ${activeTab === 'history' ? 'bg-white text-blue-900 shadow' : 'text-blue-100 hover:bg-blue-700'}`}><HistoryIcon size={14}/> Historial</button>
                                    <button onClick={() => setActiveTab('report')} className={`flex-1 py-2 text-xs font-medium rounded-md transition-all flex items-center justify-center gap-1 ${activeTab === 'report' ? 'bg-white text-blue-900 shadow' : 'text-blue-100 hover:bg-blue-700'}`}><BarChart size={14}/> Informes</button>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 bg-slate-50">
                            {activeTab === 'list' && (
                                <div className="space-y-4">
                                    <div className="space-y-2 sticky top-0 z-10 bg-slate-50 pb-2">
                                        <div className="flex gap-2">
                                            <select value={selectedLevel} onChange={(e) => {setSelectedLevel(e.target.value); setSelectedGroup('');}} className="flex-1 p-2.5 rounded-xl border border-slate-300 bg-white text-sm font-medium shadow-sm outline-none focus:border-blue-500">
                                                <option value="">Buscar en todo el IES</option>
                                                {availableLevels.map(l => <option key={l} value={l}>{l}</option>)}
                                            </select>
                                            {availableGroups.length > 0 && (
                                                <select value={selectedGroup} onChange={(e) => setSelectedGroup(e.target.value)} className="w-24 p-2.5 rounded-xl border border-slate-300 bg-white text-sm font-medium shadow-sm outline-none focus:border-blue-500">
                                                    <option value="">Todos</option>
                                                    {availableGroups.map(g => <option key={g} value={g}>{g}</option>)}
                                                </select>
                                            )}
                                        </div>
                                        <div className="relative">
                                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                            <input type="text" placeholder="Buscar en esta clase..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-300 text-sm shadow-sm outline-none focus:border-blue-500" />
                                            {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><X size={18}/></button>}
                                        </div>
                                        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                            <button onClick={() => setIsRetroMode(!isRetroMode)} className={`w-full p-3 text-sm flex items-center justify-between font-medium transition-colors ${isRetroMode ? 'bg-purple-50 text-purple-700 border-b border-purple-100' : 'text-slate-600 hover:bg-slate-50'}`}>
                                                <span className="flex items-center gap-2"><CalendarClock size={16}/> Registro Manual / Pasado</span>
                                                <span className="text-xs">{isRetroMode ? 'Cerrar' : 'Abrir'}</span>
                                            </button>
                                            {isRetroMode && (
                                                <div className="p-3 bg-purple-50/50 space-y-2">
                                                    <p className="text-xs text-purple-600 font-medium leading-tight">Selecciona fecha y hora para cargar la clase automática:</p>
                                                    <input type="datetime-local" value={retroDateTime} onChange={(e) => setRetroDateTime(e.target.value)} className="w-full p-2 text-sm border border-purple-200 rounded-lg outline-none focus:border-purple-500 bg-white" />
                                                </div>
                                            )}
                                        </div>
                                        <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm mt-2">
                                            <h3 className="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">Resumen de Hoy</h3>
                                            <div className="grid grid-cols-4 gap-2">
                                                <div className="bg-slate-50 p-2 rounded-lg border border-slate-100 text-center"><p className="text-lg font-bold leading-none">{todayStats.total}</p><p className="text-[9px] uppercase font-bold text-slate-400 mt-1">Total</p></div>
                                                <div className="bg-blue-50 p-2 rounded-lg border border-blue-100 text-center"><p className="text-lg font-bold text-blue-700 leading-none">{todayStats.bano}</p><p className="text-[9px] uppercase font-bold text-blue-400 mt-1">Baño 🚽</p></div>
                                                <div className="bg-red-50 p-2 rounded-lg border border-red-100 text-center"><p className="text-lg font-bold text-red-700 leading-none">{todayStats.enf}</p><p className="text-[9px] uppercase font-bold text-red-400 mt-1">Enf. 🤒</p></div>
                                                <div className="bg-orange-50 p-2 rounded-lg border border-orange-100 text-center"><p className="text-lg font-bold text-orange-700 leading-none">{todayStats.otros}</p><p className="text-[9px] uppercase font-bold text-orange-400 mt-1">Otro ❓</p></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-3 pb-20">
                                        {filteredStudents.map(student => {
                                            const recs = todayRecords.filter(r => r.studentId === student.id);
                                            const st = getStyles(recs.length);
                                            const bano = recs.filter(r => r.reason === 'Baño' || !r.reason).length;
                                            const enf = recs.filter(r => r.reason === 'Enfermedad').length;
                                            const otros = recs.filter(r => r.reason === 'Otros').length;
                                            return (
                                                <div key={student.id} className={`${st.bg} p-3.5 rounded-xl shadow-sm border ${st.border} flex items-center justify-between gap-2 transition-all`}>
                                                    <div className="flex-1 min-w-0">
                                                        <h3 className={`font-semibold text-sm truncate ${recs.length > 0 ? 'text-slate-900' : 'text-slate-700'}`}>{student.name}</h3>
                                                        <p className="text-xs text-slate-500 mt-0.5">{student.unit}</p>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1.5">
                                                        {recs.length > 0 && (
                                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded border flex items-center gap-1 ${st.badge}`}>
                                                                {recs.length >= 3 ? <ShieldAlert size={10} /> : <Clock size={10} />} Ha ido {recs.length} {recs.length === 1 ? 'vez' : 'veces'}
                                                            </span>
                                                        )}
                                                        <div className="flex flex-wrap justify-end gap-1">
                                                            <button onClick={() => registerBreak(student.id, 'Baño')} className={`${isRetroMode ? 'bg-purple-100 text-purple-700 border-purple-300' : st.btn} px-2 py-1.5 rounded-lg text-[11px] font-semibold border flex items-center gap-1 shadow-sm`}>🚽 Baño {bano > 0 && <span className="bg-white/70 px-1 rounded-full text-[9px]">{bano}</span>}</button>
                                                            <button onClick={() => registerBreak(student.id, 'Enfermedad')} className={`${isRetroMode ? 'bg-purple-100 text-purple-700 border-purple-300' : st.btn} px-2 py-1.5 rounded-lg text-[11px] font-semibold border flex items-center gap-1 shadow-sm`}>🤒 Enf. {enf > 0 && <span className="bg-white/70 px-1 rounded-full text-[9px]">{enf}</span>}</button>
                                                            <button onClick={() => registerBreak(student.id, 'Otros')} className={`${isRetroMode ? 'bg-purple-100 text-purple-700 border-purple-300' : st.btn} px-2 py-1.5 rounded-lg text-[11px] font-semibold border flex items-center gap-1 shadow-sm`}>❓ Otro {otros > 0 && <span className="bg-white/70 px-1 rounded-full text-[9px]">{otros}</span>}</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="space-y-4 pb-20">
                                    <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between sticky top-0 z-10">
                                        <span className="text-sm font-semibold text-slate-600 flex items-center gap-2"><Calendar size={16}/> Fecha:</span>
                                        <input type="date" value={historyDate} onChange={(e) => setHistoryDate(e.target.value)} className="p-1.5 border border-slate-300 rounded-md text-sm outline-none focus:border-blue-500" />
                                    </div>
                                    <div className="space-y-2">
                                        {historyRecords.length === 0 ? <div className="text-center py-10 text-slate-400 flex flex-col items-center"><CheckCircle size={40} className="text-slate-200 mb-2"/><p className="text-sm">Sin ausencias registradas.</p></div> :
                                            historyRecords.map(record => {
                                                const student = students.find(s => s.id === record.studentId);
                                                const time = new Date(record.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                                const reasonIcon = record.reason === 'Enfermedad' ? '🤒' : (record.reason === 'Otros' ? '❓' : '🚽');
                                                return (
                                                    <div key={record.id} className="bg-white p-3 rounded-lg shadow-sm border-l-4 border-blue-400 flex items-center justify-between">
                                                        <div className="flex-1 min-w-0 pr-2">
                                                            <p className="font-medium text-slate-700 text-xs truncate">{student?.name || 'Desconocido'}</p>
                                                            <p className="text-[10px] text-slate-500 truncate">{student?.unit} <span className="mx-1">|</span> <span className="font-medium text-slate-600">{reasonIcon} {record.reason || 'Baño'}</span></p>
                                                        </div>
                                                        <div className="flex items-center gap-2 shrink-0">
                                                            <div className="flex flex-col items-end">
                                                                <span className="text-slate-800 font-mono bg-slate-100 px-1.5 py-0.5 rounded text-xs mb-1">{time} {record.isRetroactive && <span className="text-purple-500 ml-1">*</span>}</span>
                                                                <span className="text-[9px] text-slate-400 bg-slate-50 px-1 py-0.5 rounded border border-slate-100 truncate max-w-[80px]">{formatDisplayName(record.teacherName)}</span>
                                                            </div>
                                                            {record.teacherName === teacherProfile.name && (
                                                                <button onClick={() => setRecordToDelete({ id: record.id, datePartition: historyDate, isLogout: false })} className="p-1.5 text-slate-300 hover:text-red-500 transition-colors">
                                                                    <Trash2 size={16} />
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        }
                                    </div>
                                </div>
                            )}

                            {activeTab === 'report' && (
                                <div className="space-y-4 pb-20">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2 mb-2"><FileText size={18} className="text-blue-600"/> Informe de Ausencias</h2>
                                        <div>
                                            <label className="text-xs font-semibold text-slate-500 mb-1 block">1. Selecciona la Clase</label>
                                            <select value={reportUnit} onChange={(e) => setReportUnit(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 bg-slate-50 text-sm outline-none focus:border-blue-500">
                                                <option value="">-- Elige curso --</option>
                                                {units.map(u => <option key={u} value={u}>{u}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex-1">
                                                <label className="text-xs font-semibold text-slate-500 mb-1 block">Desde</label>
                                                <input type="date" value={reportStartDate} onChange={(e) => setReportStartDate(e.target.value)} className="w-full p-2 rounded-lg border border-slate-300 text-sm outline-none focus:border-blue-500" />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-xs font-semibold text-slate-500 mb-1 block">Hasta</label>
                                                <input type="date" value={reportEndDate} onChange={(e) => setReportEndDate(e.target.value)} className="w-full p-2 rounded-lg border border-slate-300 text-sm outline-none focus:border-blue-500" />
                                            </div>
                                        </div>
                                        <button onClick={generateReport} disabled={!reportUnit || isLoadingReport} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors disabled:bg-slate-300">
                                            {isLoadingReport ? <span className="animate-pulse">Consultando...</span> : <><Search size={16}/> Consultar Ausencias</>}
                                        </button>
                                    </div>
                                    {reportRecords && (
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-4 gap-2">
                                                <div className="bg-white p-3 rounded-xl border border-slate-200 text-center"><p className="text-xl font-bold">{reportRecords.length}</p><p className="text-[10px] uppercase font-bold text-slate-400">Total</p></div>
                                                <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center"><p className="text-xl font-bold text-blue-700">{reportRecords.filter(r => r.reason === 'Baño' || !r.reason).length}</p><p className="text-[10px] uppercase font-bold text-blue-400">Baño</p></div>
                                                <div className="bg-red-50 p-3 rounded-xl border border-red-100 text-center"><p className="text-xl font-bold text-red-700">{reportRecords.filter(r => r.reason === 'Enfermedad').length}</p><p className="text-[10px] uppercase font-bold text-red-400">Enf.</p></div>
                                                <div className="bg-orange-50 p-3 rounded-xl border border-orange-100 text-center"><p className="text-xl font-bold text-orange-700">{reportRecords.filter(r => r.reason === 'Otros').length}</p><p className="text-[10px] uppercase font-bold text-orange-400">Otro</p></div>
                                            </div>
                                            <div className="space-y-2">
                                                {reportRecords.map(r => (
                                                    <div key={r.id} className="bg-white p-3 rounded-lg shadow-sm border-l-4 border-slate-400 flex items-center justify-between">
                                                        <div className="flex flex-col pr-2 border-r border-slate-100 shrink-0">
                                                            <span className="font-bold text-slate-700 text-sm">{new Date(r.timestamp).toLocaleDateString('es-ES', { day: '2-digit', month: 'short' })}</span>
                                                            <span className="text-xs text-slate-500 font-mono">{new Date(r.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                                        </div>
                                                        <div className="flex-1 min-w-0 px-2">
                                                            <p className="text-sm font-bold text-slate-800 truncate">{students.find(s=>s.id===r.studentId)?.name}</p>
                                                            <p className="text-xs font-medium text-slate-600 mt-0.5">{r.reason} <span className="text-[10px] text-slate-400 font-normal ml-1">({formatDisplayName(r.teacherName)})</span></p>
                                                        </div>
                                                        {r.isRetroactive && <span className="text-[10px] bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded border border-purple-200">Manual</span>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>
                        {toastMsg && (
                            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-3 z-40 text-sm font-medium border border-slate-700 max-w-[90%]">
                                <Info size={18} className="text-blue-400 shrink-0"/> {toastMsg}
                            </div>
                        )}
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        }

        if (window.FirebaseAPI) initReactApp();
        else window.addEventListener('firebaseReady', initReactApp);
    </script>
</body>
</html>
