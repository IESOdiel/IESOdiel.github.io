<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Pasillos - IES Odiel</title>

    <!-- Dependencias Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        select { -webkit-appearance: none; appearance: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-blue-200">
    <div id="root"></div>

    <!-- 1. Inicialización Modular de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs
        };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- 2. Lógica de la Aplicación React -->
    <script type="text/babel">
    function initReactApp() {
        const { useState, useMemo, useEffect, useRef, Fragment } = React;
        const {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged,
            getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, deleteDoc, getDocs
        } = window.FirebaseAPI;

        // Configuración de Firebase (Ground Truth)
        const firebaseConfig = {
            apiKey: "AIzaSyCeQ6so402oADraHknUMMdB95zLtz8hNd8",
            authDomain: "control-de-pasillos.firebaseapp.com",
            projectId: "control-de-pasillos",
            storageBucket: "control-de-pasillos.firebasestorage.app",
            messagingSenderId: "869022506837",
            appId: "1:869022506837:web:d3d91eb5cfd8b66d2019dc",
            measurementId: "G-X15S8NJVQV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "ies-odiel-app";

        // --- ICONOS (Con soporte para className) ---
        const Search = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const Clock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const CheckCircle = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const ShieldAlert = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const X = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const Phone = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const Trash2 = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Settings = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.96 1.41.96h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const LogOut = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const HistoryIcon = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const BarChart = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
        const FileText = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
        const CalendarClock = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><path d="M22 16a6 6 0 1 1-12 0 6 6 0 0 1 12 0Z"/></svg>;

        // --- UTILIDADES ---
        const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const formatDisplayName = (fullName) => {
            if (!fullName) return "";
            if (fullName.includes(',')) {
                const parts = fullName.split(',');
                return `${parts[1].trim()} ${parts[0].trim()}`;
            }
            return fullName;
        };
        const normalizeTeacherName = (name) => {
            if (!name) return "";
            let clean = name.split('-')[0].split('(')[0];
            return removeAccents(clean).replace(/[^a-zA-Z]/g, '').toUpperCase();
        };
        const parseUnitInfo = (u) => {
            if (!u) return { full: '', level: '', group: '' };
            const cleanU = u.trim();
            const match = cleanU.match(/^(.*?)[-\s]+([a-zA-Z0-9])$/);
            if (match) return { full: cleanU, level: match[1].trim(), group: match[2].toUpperCase() };
            return { full: cleanU, level: cleanU, group: '' };
        };
        const standardizeUnitCode = (text) => {
            if (!text) return "";
            let s = removeAccents(text.toUpperCase()).replace(/[^A-Z0-9]/g, '');
            s = s.replace(/BACHILLERATO/g, 'BAC').replace(/BACH/g, 'BAC').replace(/BCHTO/g, 'BAC');
            s = s.replace(/EDUCACIONSECUNDARIAOBLIGATORIA/g, 'ESO');
            s = s.replace(/PRIMERO/g, '1').replace(/SEGUNDO/g, '2').replace(/TERCERO/g, '3').replace(/CUARTO/g, '4');
            return s;
        };
        const getStyles = (count) => {
            if (count === 0) return { bg: 'bg-white', border: 'border-slate-200', btnBg: 'bg-blue-50 text-blue-700 hover:bg-blue-100 border-blue-200', badge: null };
            if (count === 1) return { bg: 'bg-yellow-50', border: 'border-yellow-300', btnBg: 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200 border-yellow-400', badge: 'bg-yellow-200 text-yellow-800 border-yellow-300' };
            if (count === 2) return { bg: 'bg-orange-50', border: 'border-orange-300', btnBg: 'bg-orange-100 text-orange-800 hover:bg-orange-200 border-orange-400', badge: 'bg-orange-200 text-orange-800 border-orange-300' };
            return { bg: 'bg-red-50', border: 'border-red-300', btnBg: 'bg-red-100 text-red-800 hover:bg-red-200 border-red-400', badge: 'bg-red-200 text-red-800 border-red-300' };
        };

        // --- LECTORES DE ARCHIVOS ---
        const parsePDF = async (file) => {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let rows = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                let yRows = {};
                content.items.forEach(item => {
                    const y = Math.round(item.transform[5] / 5) * 5;
                    if (!yRows[y]) yRows[y] = [];
                    yRows[y].push(item);
                });
                const sortedY = Object.keys(yRows).sort((a, b) => b - a);
                sortedY.forEach(y => {
                    const items = yRows[y].sort((a, b) => a.transform[4] - b.transform[4]);
                    let rowArr = [], currentCell = items[0].str.trim(), lastX = items[0].transform[4], lastWidth = items[0].width;
                    for (let j = 1; j < items.length; j++) {
                        if ((items[j].transform[4] - (lastX + lastWidth)) > 15) { rowArr.push(currentCell); currentCell = items[j].str.trim(); }
                        else { currentCell += ' ' + items[j].str.trim(); }
                        lastX = items[j].transform[4]; lastWidth = items[j].width || 0;
                    }
                    rowArr.push(currentCell);
                    rows.push(rowArr);
                });
            }
            return rows;
        };

        function parseCSVText(text, delimiter = ',') {
            let result = [], row = [], inQuotes = false, value = '';
            for (let i = 0; i < text.length; i++) {
                let char = text[i], next = text[i+1];
                if (char === '"') { if (inQuotes && next === '"') { value += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (char === delimiter && !inQuotes) { row.push(value.trim()); value = ''; }
                else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(value.trim()); if (row.some(c => c !== '')) result.push(row);
                    row = []; value = '';
                } else { value += char; }
            }
            if (value || row.length > 0) { row.push(value.trim()); if (row.some(c => c !== '')) result.push(row); }
            return result;
        }

        const TIME_SLOTS = [
            { id: 1, start: '08:30', end: '09:30' }, { id: 2, start: '09:30', end: '10:30' },
            { id: 3, start: '10:30', end: '11:30' }, { id: 4, start: '12:00', end: '13:00' },
            { id: 5, start: '13:00', end: '14:00' }, { id: 6, start: '14:00', end: '15:00' }
        ];

        // --- COMPONENTE APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            const [students, setStudents] = useState([]);
            const [teachersDB, setTeachersDB] = useState({});
            const [globalSchedules, setGlobalSchedules] = useState({});
            const [teacherProfile, setTeacherProfile] = useState(null);
            const [activeTab, setActiveTab] = useState('list');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedLevel, setSelectedLevel] = useState('');
            const [selectedGroup, setSelectedGroup] = useState('');

            // Estados Llamada
            const [isCallModalOpen, setIsCallModalOpen] = useState(false);
            const [selectedStudentForCall, setSelectedStudentForCall] = useState(null);
            const [callTarget, setCallTarget] = useState('Madre');
            const [notes, setNotes] = useState('');

            const [isRetroMode, setIsRetroMode] = useState(false);
            const [retroDateTime, setRetroDateTime] = useState('');
            const [historyDate, setHistoryDate] = useState(new Date().toISOString().split('T')[0]);
            const [historyRecords, setHistoryRecords] = useState([]);
            const [todayRecords, setTodayRecords] = useState([]);
            
            // Admin States
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [ideaInput, setIdeaInput] = useState('');
            const [dniPassInput, setDniPassInput] = useState('');
            const [toastMsg, setToastMsg] = useState('');
            const [recordToDelete, setRecordToDelete] = useState(null);

            const lastCalculatedSlot = useRef('');

            // --- EFECTOS ---
            useEffect(() => {
                signInAnonymously(auth).catch(() => {});
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); setIsInitializing(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubs = [
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), (s) => s.exists() && setStudents(s.data().list || [])),
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'teachers'), (s) => s.exists() && setTeachersDB(s.data().list || {})),
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), (s) => s.exists() && setGlobalSchedules(s.data().list || {}))
                ];
                const todayStr = new Date().toISOString().split('T')[0];
                unsubs.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${todayStr}`), (snap) => {
                    const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                    setTodayRecords(data);
                }));
                return () => unsubs.forEach(u => u());
            }, [user]);

            useEffect(() => {
                if (!user) return;
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`), (snap) => {
                    const data = []; snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setHistoryRecords(data);
                });
                return () => unsub();
            }, [user, historyDate]);

            useEffect(() => {
                if (!user) return;
                getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active')).then(snap => {
                    if (snap.exists() && snap.data().name) setTeacherProfile(snap.data());
                });
            }, [user]);

            // --- LÓGICA HORARIO INTELIGENTE ---
            useEffect(() => {
                if (!teacherProfile || !globalSchedules || students.length === 0 || activeTab !== 'list') return;
                const evaluate = (date) => {
                    const day = date.getDay(); if (day < 1 || day > 5) return { u: '', s: 'off' };
                    const time = date.getHours() * 60 + date.getMinutes();
                    let slot = TIME_SLOTS.find(s => {
                        const [sh, sm] = s.start.split(':').map(Number);
                        const [eh, em] = s.end.split(':').map(Number);
                        return time >= sh * 60 + sm && time < eh * 60 + em;
                    });
                    if (!slot) return { u: '', s: 'out' };
                    const key = `${day}-${slot.id}`;
                    const mySched = globalSchedules[normalizeTeacherName(teacherProfile.name)];
                    if (mySched && mySched[key]) {
                        const cell = standardizeUnitCode(mySched[key]);
                        const match = Array.from(new Set(students.map(s => s.unit))).find(u => standardizeUnitCode(u) && cell.includes(standardizeUnitCode(u)));
                        return { u: match || '', s: key };
                    }
                    return { u: '', s: key };
                };
                if (isRetroMode && retroDateTime) {
                    const res = evaluate(new Date(retroDateTime));
                    const p = parseUnitInfo(res.u); setSelectedLevel(p.level); setSelectedGroup(p.group);
                } else if (!isRetroMode) {
                    const res = evaluate(new Date());
                    if (res.s !== lastCalculatedSlot.current && res.s !== 'out') {
                        const p = parseUnitInfo(res.u); setSelectedLevel(p.level); setSelectedGroup(p.group);
                        lastCalculatedSlot.current = res.s;
                    }
                }
            }, [teacherProfile, globalSchedules, students, activeTab, isRetroMode, retroDateTime]);

            // --- BUSCADOR JERÁRQUICO ---
            const units = useMemo(() => Array.from(new Set(students.map(s => s.unit))).filter(Boolean).sort(), [students]);
            const parsedUnits = useMemo(() => units.map(parseUnitInfo), [units]);
            const availableLevels = useMemo(() => [...new Set(parsedUnits.map(p => p.level))].sort(), [parsedUnits]);

            const handleUnifiedSelection = (val) => {
                if (!val) { setSelectedLevel(''); setSelectedGroup(''); return; }
                const [lvl, grp] = val.split('|');
                setSelectedLevel(lvl); setSelectedGroup(grp || '');
            };

            const filteredStudents = useMemo(() => {
                const term = removeAccents(searchTerm.toLowerCase()).trim();
                return students.filter(s => {
                    const p = parseUnitInfo(s.unit);
                    const matchesLevel = selectedLevel ? p.level === selectedLevel : true;
                    const matchesGroup = selectedGroup ? p.group === selectedGroup : true;
                    const matchesSearch = term ? removeAccents(s.name.toLowerCase()).includes(term) : true;
                    return matchesLevel && matchesGroup && matchesSearch;
                });
            }, [students, searchTerm, selectedLevel, selectedGroup]);

            const todayStats = useMemo(() => {
                const sIds = new Set(filteredStudents.map(s => s.id));
                const recs = todayRecords.filter(r => sIds.has(r.studentId));
                return {
                    total: recs.length,
                    bano: recs.filter(r => r.reason === 'Baño' || !r.reason).length,
                    llamada: recs.filter(r => r.reason === 'Llamada').length,
                    otros: recs.filter(r => r.reason === 'Otros').length
                };
            }, [filteredStudents, todayRecords]);

            // --- ACCIONES ---
            const registerBreak = async (studentId, reason = 'Baño', target = '', callNotes = '') => {
                if (!user || !teacherProfile) return;
                const ts = (isRetroMode && retroDateTime) ? new Date(retroDateTime).toISOString() : new Date().toISOString();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `records_${ts.split('T')[0]}`), {
                        studentId, teacherName: teacherProfile.name, timestamp: ts,
                        isRetroactive: isRetroMode, reason, callTarget: target, notes: callNotes
                    });
                    setToastMsg(`✅ Registrada ${reason.toLowerCase()}.`);
                    setIsCallModalOpen(false); setNotes(''); setSelectedStudentForCall(null);
                } catch (e) { setToastMsg("❌ Error de red."); }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                const idea = ideaInput.trim().toLowerCase();
                const pass = dniPassInput.trim().toUpperCase();
                const teacher = teachersDB[idea];
                if (teacher && teacher.dni === pass) {
                    const prof = { idea, name: teacher.name };
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), prof);
                    setTeacherProfile(prof);
                } else { setToastMsg("❌ Credenciales incorrectas."); }
            };

            const handleUploadStudents = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setUploading(true);
                try {
                    let rows = file.name.endsWith('.pdf') ? await parsePDF(file) : parseCSVText(await file.text(), ';');
                    let nameIdx = -1, unitIdx = -1;
                    for (let i = 0; i < Math.min(5, rows.length); i++) {
                        const r = rows[i].map(c => removeAccents(c.toLowerCase()));
                        const n = r.findIndex(c => c.includes('alumno') || c.includes('nombre'));
                        const u = r.findIndex(c => c.includes('unidad') || c.includes('curso') || c.includes('grupo'));
                        if (n !== -1 && u !== -1) { nameIdx = n; unitIdx = u; break; }
                    }
                    const list = rows.slice(1).map((r, i) => {
                        if (!r[nameIdx] || !r[unitIdx]) return null;
                        return { id: removeAccents(r[nameIdx]).replace(/\s/g,'') + '_' + i, name: r[nameIdx], unit: r[unitIdx] };
                    }).filter(Boolean);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'students'), { list });
                    setToastMsg(`✅ ${list.length} alumnos cargados.`);
                } catch (err) { setToastMsg("❌ Error al procesar."); } finally { setUploading(false); }
            };

            const handleUploadSchedules = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setUploading(true);
                try {
                    const text = await file.text();
                    const result = {};
                    if (file.name.includes('.htm')) {
                        const docHTML = new DOMParser().parseFromString(text, 'text/html');
                        docHTML.querySelectorAll('tr').forEach(row => {
                            const cells = Array.from(row.querySelectorAll('td, th'));
                            if (cells.length < 5) return;
                            const norm = normalizeTeacherName(cells[0].textContent);
                            if (!norm || norm.length < 5) return;
                            result[norm] = {};
                            let sIdx = 0;
                            for (let i = 1; i < cells.length; i++) {
                                let colspan = parseInt(cells[i].getAttribute('colspan') || '1', 10);
                                let txt = cells[i].textContent.trim();
                                for (let c = 0; c < colspan; c++) {
                                    if (sIdx < 30 && txt) result[norm][`${Math.floor(sIdx / 6) + 1}-${(sIdx % 6) + 1}`] = txt;
                                    sIdx++;
                                }
                            }
                        });
                    }
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_data', 'schedules'), { list: result });
                    setToastMsg("✅ Horarios actualizados.");
                } catch (err) { setToastMsg("❌ Error GHC."); } finally { setUploading(false); }
            };

            if (isInitializing) return <div className="min-h-screen flex items-center justify-center text-slate-400 font-medium">Cargando IES Odiel...</div>;

            // --- VISTA LOGIN ---
            if (!teacherProfile && !isAdminMode) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                        <button onClick={() => { const p = prompt("Password:"); if (p === "odilea21") setIsAdminMode(true); }} className="absolute top-4 right-4 text-slate-300 hover:text-slate-500"><Settings size={18}/></button>
                        <form onSubmit={handleLogin} className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-slate-100">
                            <div className="flex justify-center mb-6">
                                <img src="./IES_Odiel_logo.jpg" alt="Logo" className="w-24 h-24 object-cover rounded-2xl shadow-sm" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                <div className="hidden w-24 h-24 bg-blue-100 text-blue-600 rounded-2xl items-center justify-center"><CheckCircle size={40}/></div>
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">IES Odiel</h1>
                            <div className="space-y-3 mb-6">
                                <input type="text" placeholder="Usuario IdEA" value={ideaInput} onChange={(e) => setIdeaInput(e.target.value)} className="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 text-center font-medium" required />
                                <input type="password" placeholder="DNI" value={dniPassInput} onChange={(e) => setDniPassInput(e.target.value)} className="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-blue-500 text-center uppercase font-medium" required />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-transform">ACCEDER</button>
                        </form>
                    </div>
                );
            }

            // --- VISTA ADMIN ---
            if (isAdminMode) {
                return (
                    <div className="min-h-screen bg-slate-900 p-6 text-white">
                        <div className="max-w-md mx-auto space-y-6">
                            <div className="flex justify-between items-center">
                                <h1 className="text-xl font-bold flex items-center gap-2"><Settings/> Panel de Control</h1>
                                <button onClick={() => setIsAdminMode(false)} className="bg-slate-800 p-2 rounded-full"><X/></button>
                            </div>
                            <div className="space-y-4">
                                <div className="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                                    <h3 className="text-sm font-bold mb-3 uppercase text-slate-400">Base de Datos</h3>
                                    <div className="space-y-2">
                                        <label className="block w-full bg-blue-600 p-3 rounded-xl text-center text-sm font-bold cursor-pointer">
                                            {uploading ? 'Procesando...' : 'SUBIR ALUMNADO (.PDF/.CSV)'}
                                            <input type="file" onChange={handleUploadStudents} className="hidden" />
                                        </label>
                                        <label className="block w-full bg-purple-600 p-3 rounded-xl text-center text-sm font-bold cursor-pointer">
                                            {uploading ? 'Procesando...' : 'SUBIR HORARIOS GHC (.HTM)'}
                                            <input type="file" onChange={handleUploadSchedules} className="hidden" />
                                        </label>
                                    </div>
                                    <p className="mt-4 text-xs text-slate-500 text-center">{students.length} alumnos registrados.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTA PRINCIPAL ---
            return (
                <div className="min-h-screen bg-slate-100 flex flex-col max-w-md mx-auto shadow-2xl relative">
                    
                    {/* MODAL DE LLAMADA */}
                    {isCallModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                                <h3 className="font-black text-xl mb-1 text-slate-800">Registrar Llamada</h3>
                                <p className="text-xs text-slate-400 font-bold mb-6 uppercase tracking-wider">{selectedStudentForCall?.name}</p>
                                
                                <div className="flex gap-2 mb-6">
                                    {['Madre', 'Padre', 'Familiar'].map(t => (
                                        <button key={t} onClick={() => setCallTarget(t)} className={`flex-1 py-3 text-xs rounded-xl border-2 font-black transition-all ${callTarget === t ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-400 border-slate-100'}`}>{t.toUpperCase()}</button>
                                    ))}
                                </div>

                                <textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Notas de la llamada (ej. se encuentra mal, vienen a por él...)" className="w-full p-4 border border-slate-100 bg-slate-50 rounded-2xl text-sm h-28 outline-none focus:ring-2 ring-blue-500/20 mb-6 resize-none font-medium" />

                                <div className="flex gap-3">
                                    <button onClick={() => setIsCallModalOpen(false)} className="flex-1 py-4 text-sm font-bold text-slate-400 bg-slate-100 rounded-2xl">CANCELAR</button>
                                    <button onClick={() => registerBreak(selectedStudentForCall.id, 'Llamada', callTarget, notes)} className="flex-1 py-4 text-sm font-bold text-white bg-blue-600 rounded-2xl shadow-lg shadow-blue-200">GUARDAR</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOAST */}
                    {toastMsg && (
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-[60] text-xs font-bold animate-fade-in flex items-center gap-2">
                            <CheckCircle size={16} className="text-blue-400"/> {toastMsg}
                        </div>
                    )}

                    <header className="bg-blue-800 text-white sticky top-0 z-20 p-4 shadow-lg">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <img src="./IES_Odiel_logo.jpg" alt="Logo" className="w-8 h-8 rounded-lg bg-white object-cover" onError={(e) => e.target.style.display = 'none'} />
                                <h1 className="text-lg font-black uppercase tracking-tighter">IES Odiel</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] bg-blue-900/50 px-2 py-1 rounded-lg font-bold">{formatDisplayName(teacherProfile.name)}</span>
                                <button onClick={async () => { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'active'), {}); setTeacherProfile(null); }} className="text-blue-300 hover:text-white"><LogOut size={18}/></button>
                            </div>
                        </div>
                        <div className="flex gap-1 bg-blue-900/40 p-1 rounded-xl">
                            {['list', 'history', 'report'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2 text-[10px] font-black rounded-lg transition-all uppercase ${activeTab === t ? 'bg-white text-blue-900 shadow-md' : 'text-blue-100 hover:bg-blue-700'}`}>
                                    {t === 'list' ? 'Pasillos' : t === 'history' ? 'Historial' : 'Informes'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 bg-slate-50 custom-scrollbar">
                        {activeTab === 'list' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="space-y-3 sticky top-0 z-10 bg-slate-50/95 backdrop-blur-sm pb-3">
                                    <select 
                                        value={selectedLevel + (selectedGroup ? `|${selectedGroup}` : '')}
                                        onChange={(e) => handleUnifiedSelection(e.target.value)}
                                        className="w-full p-4 rounded-2xl border border-slate-200 bg-white text-slate-700 text-sm font-black shadow-sm outline-none focus:border-blue-500"
                                    >
                                        <option value="">🏫 TODO EL CENTRO</option>
                                        {availableLevels.map(lvl => (
                                            <Fragment key={lvl}>
                                                <option value={lvl} className="font-black bg-slate-50">{lvl}</option>
                                                {parsedUnits.filter(p => p.level === lvl && p.group).map(p => (
                                                    <option key={p.full} value={`${p.level}|${p.group}`}>&nbsp;&nbsp;&nbsp;{p.level} {p.group}</option>
                                                ))}
                                            </Fragment>
                                        ))}
                                    </select>

                                    <div className="relative">
                                        <Search size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                        <input type="text" placeholder="Buscar por nombre..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 text-sm outline-none shadow-sm focus:border-blue-500 font-medium" />
                                    </div>

                                    <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm grid grid-cols-4 gap-2">
                                        {[
                                            { label: 'Total', val: todayStats.total, color: 'text-slate-800' },
                                            { label: 'Baño 🚽', val: todayStats.bano, color: 'text-blue-600' },
                                            { label: 'Llamada 📞', val: todayStats.llamada, color: 'text-red-600' },
                                            { label: 'Otro ❓', val: todayStats.otros, color: 'text-orange-600' }
                                        ].map(s => (
                                            <div key={s.label} className="text-center">
                                                <p className={`text-xl font-black leading-none ${s.color}`}>{s.val}</p>
                                                <p className="text-[8px] font-black text-slate-400 mt-2 uppercase tracking-widest">{s.label}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-3 pb-12">
                                    {filteredStudents.map(student => {
                                        const sRecords = todayRecords.filter(r => r.studentId === student.id);
                                        const count = sRecords.length;
                                        const styles = getStyles(count);
                                        return (
                                            <div key={student.id} className={`${styles.bg} p-4 rounded-2xl shadow-sm border ${styles.border} flex flex-col gap-4 transition-all animate-fade-in`}>
                                                <div className="flex justify-between items-start">
                                                    <div className="min-w-0">
                                                        <h3 className="font-bold text-sm text-slate-800 truncate leading-tight uppercase">{student.name}</h3>
                                                        <p className="text-[10px] text-slate-400 font-black mt-1 uppercase">{student.unit}</p>
                                                    </div>
                                                    {count > 0 && (
                                                        <span className={`text-[9px] font-black px-2 py-1 rounded-lg border flex items-center gap-1 ${styles.badge}`}>
                                                            {count >= 3 ? <ShieldAlert size={10}/> : <Clock size={10}/>} {count} {count === 1 ? 'VEZ' : 'VECES'}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => registerBreak(student.id, 'Baño')} className={`flex-1 py-3 rounded-xl text-[10px] font-black border transition-colors ${styles.btnBg}`}>🚽 BAÑO</button>
                                                    <button onClick={() => { setSelectedStudentForCall(student); setIsCallModalOpen(true); }} className={`flex-1 py-3 rounded-xl text-[10px] font-black border transition-colors ${styles.btnBg}`}>📞 LLAMADA</button>
                                                    <button onClick={() => registerBreak(student.id, 'Otros')} className={`flex-1 py-3 rounded-xl text-[10px] font-black border transition-colors ${styles.btnBg}`}>❓ OTRO</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between sticky top-0 z-10">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registros de:</span>
                                    <input type="date" value={historyDate} onChange={(e) => setHistoryDate(e.target.value)} className="text-xs font-black p-2 border border-slate-200 rounded-xl outline-none" />
                                </div>
                                <div className="space-y-3 pb-12">
                                    {historyRecords.map(record => {
                                        const s = students.find(x => x.id === record.studentId);
                                        const isOwner = teacherProfile && normalizeTeacherName(record.teacherName) === normalizeTeacherName(teacherProfile.name);
                                        return (
                                            <div key={record.id} className="bg-white p-4 rounded-2xl border-l-4 border-blue-600 shadow-sm flex items-center justify-between animate-fade-in">
                                                <div className="flex-1 min-w-0 pr-4">
                                                    <p className="font-bold text-xs truncate uppercase text-slate-700">{s?.name || '---'}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold mt-1">
                                                        {record.reason === 'Llamada' ? (
                                                            <span className="text-red-500">📞 {record.callTarget}: {record.notes || 'Sin notas'}</span>
                                                        ) : (
                                                            <span>{record.reason === 'Otros' ? '❓ OTROS' : '🚽 BAÑO'}</span>
                                                        )}
                                                    </p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-black text-slate-800">{new Date(record.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                                                        <p className="text-[9px] text-slate-400 font-medium truncate max-w-[80px]">{formatDisplayName(record.teacherName)}</p>
                                                    </div>
                                                    {isOwner && (
                                                        <button onClick={async () => { if(confirm("¿Anular?")) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${historyDate}`, record.id)); setToastMsg("🗑️ Registro anulado."); } }} className="text-slate-200 hover:text-red-500 transition-colors">
                                                            <Trash2 size={18} />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'report' && (
                            <div className="py-20 text-center animate-fade-in">
                                <FileText size={56} className="mx-auto text-slate-200 mb-4" />
                                <h3 className="font-black text-slate-800 uppercase tracking-tight">Módulo de Informes</h3>
                                <p className="text-xs text-slate-400 px-12 mt-2 font-medium leading-relaxed">Próximamente: Exportación de datos y estadísticas detalladas por curso.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    }

    if (window.FirebaseAPI) { initReactApp(); }
    else { window.addEventListener('firebaseReady', initReactApp); }
    </script>
</body>
</html>
